<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JS Quest Ch.2 — Speed Racer</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Inter:wght@400;600;700;900&family=Orbitron:wght@700;900&display=swap');

    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #0a0a12;
      --surface: #141422;
      --surface2: #1c1c30;
      --accent: #e63946;
      --accent-glow: #ff6b6b;
      --green: #10b981;
      --green-glow: #34d399;
      --blue: #3b82f6;
      --orange: #f59e0b;
      --purple: #8b5cf6;
      --text: #e2e8f0;
      --text-dim: #94a3b8;
      --code-bg: #0d1117;
      --border: #2a2a40;
      --road: #2d2d3d;
    }

    body {
      font-family: 'Inter', sans-serif;
      background: var(--bg);
      color: var(--text);
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ── Top Bar ── */
    .topbar {
      display: flex; align-items: center; justify-content: space-between;
      padding: 14px 24px; background: var(--surface);
      border-bottom: 2px solid var(--accent); position: sticky; top: 0; z-index: 100;
    }
    .topbar-left { display: flex; align-items: center; gap: 16px; }
    .logo {
      font-family: 'Orbitron', sans-serif; font-weight: 900; font-size: 1.2rem;
      color: var(--accent);
    }
    .logo span { color: var(--text); }
    .xp-pill {
      display: flex; align-items: center; gap: 8px;
      background: var(--surface2); padding: 5px 14px; border-radius: 20px;
    }
    .xp-pill .val { font-family: 'Orbitron', sans-serif; font-size: 0.8rem; color: var(--orange); }
    .xp-bar-track { width: 100px; height: 6px; background: #1a1a2e; border-radius: 3px; }
    .xp-bar-fill { height: 100%; border-radius: 3px; background: linear-gradient(90deg, var(--orange), #fbbf24); transition: width 0.5s; }
    .topbar-right { display: flex; gap: 8px; }
    .btn-sm {
      padding: 5px 12px; border-radius: 6px; border: 1px solid var(--border);
      background: var(--surface2); color: var(--text-dim); cursor: pointer;
      font-size: 0.75rem; font-weight: 600; transition: all 0.2s;
    }
    .btn-sm:hover { border-color: var(--accent); color: var(--text); }

    /* ── Views ── */
    .view { display: none; max-width: 920px; margin: 0 auto; padding: 24px 20px; }
    .view.active { display: block; }

    /* ── Map ── */
    .map-header { text-align: center; margin-bottom: 32px; }
    .map-header h1 {
      font-family: 'Orbitron', sans-serif; font-size: 2rem;
      background: linear-gradient(135deg, var(--accent), var(--orange));
      -webkit-background-clip: text; -webkit-text-fill-color: transparent;
    }
    .map-header p { color: var(--text-dim); margin-top: 6px; }
    .level-list { display: flex; flex-direction: column; align-items: center; gap: 10px; }
    .lnode {
      width: 320px; padding: 16px 20px; background: var(--surface);
      border: 2px solid var(--border); border-radius: 14px;
      cursor: pointer; transition: all 0.3s; display: flex; align-items: center; gap: 14px;
      position: relative;
    }
    .lnode:hover { transform: translateY(-2px); border-color: var(--accent); }
    .lnode.done { border-color: var(--green); }
    .lnode.done .licon { background: var(--green); }
    .lnode.locked { opacity: 0.35; cursor: not-allowed; }
    .lnode.locked:hover { transform: none; border-color: var(--border); }
    .lnode.cur { border-color: var(--accent); box-shadow: 0 0 24px rgba(230,57,70,0.25); }
    .licon {
      width: 44px; height: 44px; border-radius: 12px; background: var(--accent);
      display: flex; align-items: center; justify-content: center; font-size: 1.4rem; flex-shrink: 0;
    }
    .linfo h3 { font-size: 0.9rem; margin-bottom: 2px; }
    .linfo p { font-size: 0.72rem; color: var(--text-dim); }
    .lstars { position: absolute; right: 14px; top: 50%; transform: translateY(-50%); }
    .pipe { width: 2px; height: 16px; background: var(--border); }
    .pipe.done { background: var(--green); }

    /* ── Challenge ── */
    .ch-head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
    .back-btn { background: none; border: none; color: var(--text-dim); cursor: pointer; font-size: 0.9rem; font-weight: 600; }
    .back-btn:hover { color: var(--text); }
    .dots { display: flex; gap: 5px; }
    .dot { width: 9px; height: 9px; border-radius: 50%; background: var(--surface2); border: 1px solid var(--border); }
    .dot.ok { background: var(--green); border-color: var(--green); }
    .dot.on { background: var(--accent); border-color: var(--accent); }

    /* ── Cards ── */
    .story-card {
      background: linear-gradient(135deg, var(--surface), var(--surface2));
      border: 1px solid var(--border); border-radius: 16px; padding: 24px; margin-bottom: 20px;
    }
    .story-card .emo { font-size: 2.2rem; display: block; margin-bottom: 8px; }
    .story-card h2 { font-size: 1.2rem; margin-bottom: 8px; }
    .story-card p { color: var(--text-dim); line-height: 1.65; }
    .story-card code {
      background: var(--code-bg); padding: 2px 6px; border-radius: 4px;
      font-family: 'JetBrains Mono', monospace; font-size: 0.83em; color: var(--accent-glow);
    }

    .teach-block {
      background: var(--code-bg); border: 1px solid var(--border);
      border-radius: 12px; padding: 18px; margin-bottom: 20px;
    }
    .teach-block h3 {
      color: var(--green-glow); font-size: 0.8rem; text-transform: uppercase;
      letter-spacing: 1px; margin-bottom: 10px;
    }
    .teach-block pre {
      font-family: 'JetBrains Mono', monospace; font-size: 0.82rem;
      line-height: 1.7; color: var(--text); overflow-x: auto;
    }
    .hl { color: #a78bfa; } .cm { color: #6b7280; } .st { color: #34d399; }
    .kw { color: #f472b6; } .nm { color: #f59e0b; }

    .ch-card {
      background: var(--surface); border: 1px solid var(--border);
      border-radius: 14px; padding: 22px; margin-bottom: 14px;
    }
    .ch-card h3 { margin-bottom: 10px; font-size: 1.05rem; }
    .ch-card p { color: var(--text-dim); margin-bottom: 14px; line-height: 1.5; }

    .code-editor {
      width: 100%; min-height: 110px; padding: 14px;
      background: var(--code-bg); border: 2px solid var(--border);
      border-radius: 10px; color: var(--text);
      font-family: 'JetBrains Mono', monospace; font-size: 0.82rem;
      line-height: 1.6; resize: vertical; outline: none; transition: border-color 0.3s;
    }
    .code-editor:focus { border-color: var(--accent); }
    .code-editor.ok { border-color: var(--green) !important; }
    .code-editor.bad { border-color: #ef4444 !important; animation: shake 0.35s; }
    @keyframes shake {
      0%,100% { transform: translateX(0); }
      25% { transform: translateX(-5px); }
      75% { transform: translateX(5px); }
    }

    .mcq-opts { display: flex; flex-direction: column; gap: 8px; margin-bottom: 14px; }
    .mcq-opt {
      padding: 12px 16px; background: var(--surface2); border: 2px solid var(--border);
      border-radius: 10px; cursor: pointer; font-size: 0.85rem; transition: all 0.2s;
      font-family: 'JetBrains Mono', monospace;
    }
    .mcq-opt:hover { border-color: var(--accent); }
    .mcq-opt.sel { border-color: var(--accent); background: rgba(230,57,70,0.12); }
    .mcq-opt.ok { border-color: var(--green); background: rgba(16,185,129,0.12); }
    .mcq-opt.bad { border-color: #ef4444; background: rgba(239,68,68,0.08); }

    .fill-inp {
      display: inline-block; width: 130px; padding: 4px 8px;
      background: var(--code-bg); border: 2px solid var(--border);
      border-radius: 6px; color: var(--accent-glow);
      font-family: 'JetBrains Mono', monospace; font-size: 0.83rem;
      text-align: center; outline: none;
    }
    .fill-inp:focus { border-color: var(--accent); }

    .console {
      background: #000; border-radius: 8px; padding: 12px;
      font-family: 'JetBrains Mono', monospace; font-size: 0.78rem;
      color: var(--green-glow); margin-bottom: 14px; min-height: 36px; border: 1px solid #222;
    }

    .btn-row { display: flex; gap: 10px; flex-wrap: wrap; }
    .btn {
      padding: 9px 22px; border-radius: 9px; border: none;
      font-weight: 700; font-size: 0.85rem; cursor: pointer; transition: all 0.2s;
    }
    .btn-p { background: linear-gradient(135deg, var(--accent), #c1121f); color: #fff; }
    .btn-p:hover { transform: translateY(-1px); box-shadow: 0 4px 14px rgba(230,57,70,0.4); }
    .btn-s { background: var(--surface2); color: var(--text); border: 1px solid var(--border); }
    .btn-s:hover { border-color: var(--accent); }
    .btn:disabled { opacity: 0.35; cursor: not-allowed; transform: none !important; }

    .fb { padding: 12px 16px; border-radius: 10px; margin-top: 14px; font-weight: 600; display: none; }
    .fb.show { display: block; animation: fadeUp 0.3s; }
    .fb.win { background: rgba(16,185,129,0.12); border: 1px solid var(--green); color: var(--green-glow); }
    .fb.lose { background: rgba(239,68,68,0.08); border: 1px solid #ef4444; color: #fca5a5; }
    .fb .hint { font-weight: 400; color: var(--text-dim); margin-top: 5px; font-size: 0.82rem; }
    @keyframes fadeUp { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }

    /* ── Celebration ── */
    .cel-ov {
      position: fixed; inset: 0; background: rgba(0,0,0,0.75);
      display: none; align-items: center; justify-content: center; z-index: 200;
    }
    .cel-ov.show { display: flex; }
    .cel-box {
      background: var(--surface); border: 2px solid var(--green);
      border-radius: 20px; padding: 36px; text-align: center; max-width: 420px;
      animation: popIn 0.35s;
    }
    @keyframes popIn { from { transform: scale(0.85); opacity: 0; } to { transform: scale(1); opacity: 1; } }
    .cel-box .big { font-size: 3.5rem; display: block; margin-bottom: 12px; }
    .cel-box h2 { font-size: 1.4rem; margin-bottom: 6px; color: var(--green-glow); }
    .cel-box p { color: var(--text-dim); margin-bottom: 16px; }
    .cel-box .xpe { font-size: 1.1rem; color: var(--orange); font-weight: 700; margin-bottom: 14px; }
    .cel-box .reward-label {
      display: inline-block; background: var(--surface2); border: 1px solid var(--accent);
      border-radius: 8px; padding: 6px 16px; font-size: 0.85rem; color: var(--accent-glow);
      margin-bottom: 14px;
    }

    .particle {
      position: fixed; pointer-events: none; z-index: 300;
      animation: pfall 1.4s ease-out forwards;
    }
    @keyframes pfall {
      0% { opacity: 1; transform: translateY(0) rotate(0) scale(1); }
      100% { opacity: 0; transform: translateY(280px) rotate(700deg) scale(0); }
    }

    /* ═══ MINI GAME STYLES ═══ */
    .game-container {
      background: var(--surface); border: 2px solid var(--accent);
      border-radius: 16px; overflow: hidden; margin-bottom: 20px;
    }
    .game-titlebar {
      display: flex; justify-content: space-between; align-items: center;
      padding: 10px 16px; background: var(--surface2); border-bottom: 1px solid var(--border);
    }
    .game-titlebar h3 { font-family: 'Orbitron', sans-serif; font-size: 0.85rem; color: var(--accent); }
    .game-titlebar .game-stats { display: flex; gap: 14px; font-size: 0.8rem; color: var(--text-dim); }
    .game-titlebar .game-stats span { font-family: 'Orbitron', sans-serif; color: var(--orange); }

    canvas#gameCanvas {
      display: block; width: 100%; background: var(--road);
    }

    .game-controls-info {
      padding: 10px 16px; background: var(--surface2);
      border-top: 1px solid var(--border); font-size: 0.75rem; color: var(--text-dim);
      display: flex; justify-content: space-between; align-items: center;
    }
    .game-controls-info kbd {
      background: var(--code-bg); padding: 2px 8px; border-radius: 4px;
      border: 1px solid var(--border); font-family: 'JetBrains Mono', monospace; font-size: 0.7rem;
    }

    /* ── Dashboard (Level 1 reward) ── */
    .dashboard {
      background: linear-gradient(180deg, #111120, #0a0a14);
      border: 2px solid var(--border); border-radius: 16px;
      padding: 24px; margin-bottom: 20px;
    }
    .dash-row { display: flex; gap: 20px; justify-content: center; flex-wrap: wrap; }
    .gauge {
      width: 140px; text-align: center;
    }
    .gauge canvas { display: block; margin: 0 auto 8px; }
    .gauge-label { font-family: 'Orbitron', sans-serif; font-size: 0.7rem; color: var(--text-dim); text-transform: uppercase; letter-spacing: 1px; }
    .gauge-value { font-family: 'Orbitron', sans-serif; font-size: 1.4rem; color: var(--accent); }

    @media (max-width: 600px) {
      .topbar { flex-wrap: wrap; gap: 6px; }
      .lnode { width: 100%; }
      .view { padding: 14px 10px; }
    }
  </style>
</head>
<body>

<!-- ── Top Bar ── -->
<div class="topbar">
  <div class="topbar-left">
    <div class="logo">SPEED <span>RACER</span></div>
    <div class="xp-pill">
      <span class="val" id="xpLabel">0 XP</span>
      <div class="xp-bar-track"><div class="xp-bar-fill" id="xpBar" style="width:0%"></div></div>
    </div>
  </div>
  <div class="topbar-right">
    <a href="jsquest.html" class="btn-sm" style="text-decoration:none;">Ch.1</a>
    <button class="btn-sm" onclick="resetAll()">Reset</button>
  </div>
</div>

<!-- ── Map View ── -->
<div class="view active" id="mapView">
  <div class="map-header">
    <h1>Chapter 2: Speed Racer</h1>
    <p>Learn intermediate JS by building a racing game — piece by piece</p>
  </div>
  <div class="level-list" id="levelList"></div>
</div>

<!-- ── Challenge View ── -->
<div class="view" id="chView">
  <div class="ch-head">
    <button class="back-btn" onclick="goMap()">&#8592; Back to Map</button>

  </div>

</div>

<div class="view" id="gameView">

    <button class="back-btn" onclick="goMap()">&#8592; Back to Map</button>

    <button class="btn btn-p" id="celBtn">Play Reward!</button>
  </div>
</div>

<script>
// ═══════════════════════════════════════════
//  SOUND ENGINE — Web Audio API
// ═══════════════════════════════════════════

const AudioCtx = window.AudioContext || window.webkitAudioContext;
let audioCtx;
function getAudio() {
  if (!audioCtx) audioCtx = new AudioCtx();
  return audioCtx;
}

const SFX = {
  engine(speed = 0.5, duration = 0.3) {
    const ctx = getAudio();
    const osc = ctx.createOscillator();
    const gain = ctx.createGain();
    osc.type = 'sawtooth';
    osc.frequency.setValueAtTime(60 + speed * 200, ctx.currentTime);
    osc.frequency.linearRampToValueAtTime(80 + speed * 280, ctx.currentTime + duration);
    gain.gain.setValueAtTime(0.08, ctx.currentTime);
    gain.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + duration);
    osc.connect(gain).connect(ctx.destination);
    osc.start(); osc.stop(ctx.currentTime + duration);
  },

  honk() {
    const ctx = getAudio();
    const o1 = ctx.createOscillator();
    const o2 = ctx.createOscillator();
    const g = ctx.createGain();
    o1.type = 'square'; o1.frequency.value = 340;
    o2.type = 'square'; o2.frequency.value = 460;
    g.gain.setValueAtTime(0.12, ctx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.4);
    o1.connect(g); o2.connect(g); g.connect(ctx.destination);
    o1.start(); o2.start(); o1.stop(ctx.currentTime + 0.4); o2.stop(ctx.currentTime + 0.4);
  },

  screech() {
    const ctx = getAudio();
    const bufSize = ctx.sampleRate * 0.5;
    const buf = ctx.createBuffer(1, bufSize, ctx.sampleRate);
    const data = buf.getChannelData(0);
    for (let i = 0; i < bufSize; i++) data[i] = Math.random() * 2 - 1;
    const src = ctx.createBufferSource();
    src.buffer = buf;
    const filter = ctx.createBiquadFilter();
    filter.type = 'bandpass'; filter.frequency.value = 3000; filter.Q.value = 15;
    const g = ctx.createGain();
    g.gain.setValueAtTime(0.15, ctx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.5);
    src.connect(filter).connect(g).connect(ctx.destination);
    src.start(); src.stop(ctx.currentTime + 0.5);
  },

  crash() {
    const ctx = getAudio();
    const bufSize = ctx.sampleRate * 0.6;
    const buf = ctx.createBuffer(1, bufSize, ctx.sampleRate);
    const data = buf.getChannelData(0);
    for (let i = 0; i < bufSize; i++) data[i] = Math.random() * 2 - 1;
    const src = ctx.createBufferSource();
    src.buffer = buf;
    const g = ctx.createGain();
    g.gain.setValueAtTime(0.25, ctx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.6);
    src.connect(g).connect(ctx.destination);
    src.start(); src.stop(ctx.currentTime + 0.6);
  },

  boost() {
    const ctx = getAudio();
    const osc = ctx.createOscillator();
    const g = ctx.createGain();
    osc.type = 'sawtooth';
    osc.frequency.setValueAtTime(200, ctx.currentTime);
    osc.frequency.exponentialRampToValueAtTime(1200, ctx.currentTime + 0.5);
    g.gain.setValueAtTime(0.1, ctx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.5);
    osc.connect(g).connect(ctx.destination);
    osc.start(); osc.stop(ctx.currentTime + 0.5);
  },

  coin() {
    const ctx = getAudio();
    const osc = ctx.createOscillator();
    const g = ctx.createGain();
    osc.type = 'sine';
    osc.frequency.setValueAtTime(800, ctx.currentTime);
    osc.frequency.setValueAtTime(1200, ctx.currentTime + 0.08);
    g.gain.setValueAtTime(0.1, ctx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.2);
    osc.connect(g).connect(ctx.destination);
    osc.start(); osc.stop(ctx.currentTime + 0.2);
  },

  levelUp() {
    const ctx = getAudio();
    [523, 659, 784, 1047].forEach((freq, i) => {
      const osc = ctx.createOscillator();
      const g = ctx.createGain();
      osc.type = 'sine';
      osc.frequency.value = freq;
      g.gain.setValueAtTime(0, ctx.currentTime + i * 0.12);
      g.gain.linearRampToValueAtTime(0.08, ctx.currentTime + i * 0.12 + 0.02);
      g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + i * 0.12 + 0.3);
      osc.connect(g).connect(ctx.destination);
      osc.start(ctx.currentTime + i * 0.12);
      osc.stop(ctx.currentTime + i * 0.12 + 0.3);
    });
  }
};

// ═══════════════════════════════════════════
//  CAR DRAWING (SVG / Canvas)
// ═══════════════════════════════════════════

function drawCarTopDown(ctx, x, y, w, h, color = '#e63946') {
  ctx.save();
  ctx.translate(x, y);

  // Body
  ctx.fillStyle = color;
  ctx.beginPath();
  ctx.roundRect(-w/2, -h/2, w, h, [w*0.3, w*0.3, w*0.15, w*0.15]);
  ctx.fill();

  // Windshield
  ctx.fillStyle = 'rgba(100,200,255,0.4)';
  ctx.beginPath();
  ctx.roundRect(-w*0.35, -h*0.15, w*0.7, h*0.22, 4);
  ctx.fill();

  // Rear window
  ctx.fillStyle = 'rgba(100,200,255,0.3)';
  ctx.beginPath();
  ctx.roundRect(-w*0.28, h*0.15, w*0.56, h*0.15, 3);
  ctx.fill();

  // Wheels
  ctx.fillStyle = '#222';
  const ww = w * 0.18, wh = h * 0.18;
  ctx.fillRect(-w/2 - ww*0.3, -h*0.32, ww, wh);
  ctx.fillRect(w/2 - ww*0.7, -h*0.32, ww, wh);
  ctx.fillRect(-w/2 - ww*0.3, h*0.18, ww, wh);
  ctx.fillRect(w/2 - ww*0.7, h*0.18, ww, wh);

  // Headlights
  ctx.fillStyle = '#ffd700';
  ctx.beginPath();
  ctx.arc(-w*0.28, -h/2 + 4, 3, 0, Math.PI * 2);
  ctx.arc(w*0.28, -h/2 + 4, 3, 0, Math.PI * 2);
  ctx.fill();

  // Taillights
  ctx.fillStyle = '#ff3333';
  ctx.beginPath();
  ctx.arc(-w*0.28, h/2 - 4, 3, 0, Math.PI * 2);
  ctx.arc(w*0.28, h/2 - 4, 3, 0, Math.PI * 2);
  ctx.fill();

  ctx.restore();
}

function drawBikeTopDown(ctx, x, y, h, color = '#3b82f6') {
  ctx.save();
  ctx.translate(x, y);
  const w = 14;

  // Body
  ctx.fillStyle = color;
  ctx.beginPath();
  ctx.roundRect(-w/2, -h/2, w, h, [w*0.4, w*0.4, w*0.2, w*0.2]);
  ctx.fill();

  // Wheels
  ctx.fillStyle = '#222';
  ctx.beginPath();
  ctx.ellipse(0, -h/2 + 5, 5, 7, 0, 0, Math.PI * 2);
  ctx.ellipse(0, h/2 - 5, 5, 7, 0, 0, Math.PI * 2);
  ctx.fill();

  // Rider head
  ctx.fillStyle = '#ff6b6b';
  ctx.beginPath();
  ctx.arc(0, -h*0.05, 5, 0, Math.PI * 2);
  ctx.fill();

  ctx.restore();
}

        code: `<span class="cm">// Object destructuring</span>\n<span class="kw">const</span> car = { name: <span class="st">"Mustang"</span>, hp: <span class="nm">450</span>, color: <span class="st">"red"</span> };\n<span class="kw">const</span> { <span class="hl">name</span>, <span class="hl">hp</span> } = car;  <span class="cm">// name="Mustang", hp=450</span>\n\n<span class="cm">// Array destructuring</span>\n<span class="kw">const</span> [<span class="hl">first</span>, <span class="hl">second</span>] = [<span class="st">"gold"</span>, <span class="st">"silver"</span>, <span class="st">"bronze"</span>];\n<span class="cm">// first="gold", second="silver"</span>\n\n<span class="cm">// Spread: copy & combine</span>\n<span class="kw">const</span> garage = [<span class="st">"Mustang"</span>, <span class="st">"Supra"</span>];\n<span class="kw">const</span> newGarage = [<span class="hl">...garage</span>, <span class="st">"GT-R"</span>];  <span class="cm">// ["Mustang","Supra","GT-R"]</span>\n\n<span class="cm">// Spread with objects</span>\n<span class="kw">const</span> upgraded = { <span class="hl">...car</span>, hp: <span class="nm">500</span>, turbo: <span class="kw">true</span> };\n<span class="cm">// { name:"Mustang", hp:500, color:"red", turbo:true }</span>\n\n<span class="cm">// Rest params: collect remaining args</span>\n<span class="kw">function</span> race(first, <span class="hl">...others</span>) {\n  console.log(<span class="st">\`Winner: \${first}\`</span>);\n  console.log(<span class="st">\`Others: \${others}\`</span>);\n}`
      },
      {
        type: 'mcq',
        question: 'What does const { hp } = { name: "Supra", hp: 335 } give you?',
        options: ['{ hp: 335 }', '335', '"Supra"', 'undefined'],
        correct: 1, hint: 'Destructuring pulls out the VALUE of the matching key'
      },
      {
        type: 'mcq',
        question: 'What does [...arr1, ...arr2] do?',
        options: ['Subtracts arr2 from arr1', 'Combines both arrays into a new one', 'Compares the arrays', 'Sorts both arrays'],
        correct: 1, hint: 'The spread operator "spreads" elements into a new array'
      },
      {
        type: 'code',
        question: 'Write a function `upgradeCar` that takes a car object and a `newHP` value. Return a NEW object (don\'t modify original) with the same properties but hp changed to newHP and a new property `upgraded: true`.\n\nUse the spread operator!',
        starter: 'function upgradeCar(car, newHP) {\n  \n}',

          } catch(e) { return { pass: false, msg: e.message }; }
        },
        hint: 'The spread operator lets you copy all properties into a new object. If you list a property AFTER the spread, it overrides the copied one. Don\'t forget to add the new boolean property!'
      },
      {
        type: 'code',
        question: 'Write a function `raceResults` that takes any number of car name strings and returns an object:\n{ gold: first arg, silver: second arg, others: rest in an array }\n\nraceResults("Supra", "GT-R", "Civic", "Mustang") → { gold: "Supra", silver: "GT-R", others: ["Civic", "Mustang"] }',
        starter: '',
        validate: (code) => {

          } catch(e) { return { pass: false, msg: e.message }; }
        },

  // ── LEVEL 6: BOSS — Build a Racing Game ──
  {
    id: 'boss', icon: '🏁', title: 'BOSS — Build the Race!',

      {
        type: 'code',
        question: 'Write a function `checkCollision` that takes two rectangle objects (each with x, y, width, height) and returns true if they overlap, false otherwise.\n\nThis is the core of hit detection in every game!',
        starter: 'function checkCollision(rect1, rect2) {\n  \n}',

          try {
            const fn = new Function(code + `
              const a = checkCollision({x:0,y:0,width:50,height:50}, {x:30,y:30,width:50,height:50});
              const b = checkCollision({x:0,y:0,width:50,height:50}, {x:100,y:100,width:50,height:50});
              const c = checkCollision({x:0,y:0,width:10,height:10}, {x:5,y:5,width:10,height:10});

          } catch(e) { return { pass: false, msg: e.message }; }
        },

let curLevel = null, curCh = 0, results = [];

function goMap() {
  document.getElementById('mapView').classList.add('active');
  document.getElementById('chView').classList.remove('active');
  document.getElementById('gameView').classList.remove('active');
  renderMap(); updateBar();
  // Stop any running games
  if (window._gameRAF) { cancelAnimationFrame(window._gameRAF); window._gameRAF = null; }
}

function renderMap() {
  const el = document.getElementById('levelList');
  el.innerHTML = '';
  LEVELS.forEach((lv, i) => {
    const done = S.done[lv.id];
    const locked = i > 0 && !S.done[LEVELS[i-1].id];
    const cur = !done && !locked;
    const stars = S.stars[lv.id] || 0;

    if (i > 0) {
      const p = document.createElement('div');
      p.className = 'pipe' + (S.done[LEVELS[i-1].id] ? ' done' : '');
      el.appendChild(p);
    }
    const n = document.createElement('div');
    n.className = `lnode${done?' done':''}${locked?' locked':''}${cur?' cur':''}`;
    n.innerHTML = `
      <div class="licon">${lv.icon}</div>
      <div class="linfo"><h3>${lv.title}</h3><p>${lv.desc}</p></div>
      ${done ? `<div class="lstars">${'⭐'.repeat(stars)}</div>` : ''}
    `;
    if (!locked) n.onclick = () => startLevel(i);
    el.appendChild(n);

    // Show "Play Reward" button for completed levels
    if (done && lv.reward) {
      const rb = document.createElement('button');
      rb.className = 'btn btn-s';
      rb.style.cssText = 'margin-top: 4px; font-size: 0.75rem;';
      rb.textContent = '🎮 Play Reward';
      rb.onclick = (e) => { e.stopPropagation(); showReward(lv.reward); };
      // Insert inside the node
      n.appendChild(rb);
      n.style.flexWrap = 'wrap';
    }
  });
}

function startLevel(i) {
  curLevel = i; curCh = 0; results = [];
  document.getElementById('mapView').classList.remove('active');
  document.getElementById('chView').classList.add('active');
  renderCh();
}

function renderCh() {
  const lv = LEVELS[curLevel];
  const ch = lv.challenges[curCh];
  const el = document.getElementById('chContent');

  // Dots
  document.getElementById('dots').innerHTML = lv.challenges.map((_, i) =>
    `<div class="dot${i < curCh ? ' ok' : ''}${i === curCh ? ' on' : ''}"></div>`
  ).join('');

  switch (ch.type) {
    case 'story': renderStory(ch, el); break;
    case 'teach': renderTeach(ch, el); break;
    case 'mcq': renderMCQ(ch, el); break;
    case 'fill': renderFill(ch, el); break;
    case 'code': renderCode(ch, el); break;
  }
}

function renderStory(ch, el) {
  el.innerHTML = `
    <div class="story-card">
      <span class="emo">${ch.emoji}</span>
      <h2>${ch.title}</h2>
      <p>${ch.body.replace(/\n/g,'<br>')}</p>
    </div>
    <button class="btn btn-p" onclick="SFX.engine(0.3);nextCh()">Let's Go! →</button>
  `;
}

function renderTeach(ch, el) {
  el.innerHTML = `
    <div class="teach-block">
      <h3>${ch.heading}</h3>
      <pre>${ch.code}</pre>
    </div>
    <button class="btn btn-p" onclick="nextCh()">Got it →</button>
  `;
}

let selMCQ = -1;
function renderMCQ(ch, el) {
  selMCQ = -1;
  el.innerHTML = `
    <div class="ch-card">
      <h3>Choose the correct answer</h3>
      <p style="font-family:'JetBrains Mono',monospace;white-space:pre-wrap;">${ch.question.replace(/\n/g,'<br>')}</p>
      <div class="mcq-opts" id="opts">
        ${ch.options.map((o, i) => `<div class="mcq-opt" data-i="${i}" onclick="pickMCQ(${i})">${o}</div>`).join('')}
      </div>
      <button class="btn btn-p" id="mcqBtn" disabled onclick="checkMCQ()">Check</button>
      <div class="fb" id="fb"></div>
    </div>
  `;
}

function pickMCQ(i) {
  selMCQ = i;
  document.querySelectorAll('.mcq-opt').forEach((o, j) => o.classList.toggle('sel', j === i));
  document.getElementById('mcqBtn').disabled = false;
}

function checkMCQ() {
  const ch = LEVELS[curLevel].challenges[curCh];
  const opts = document.querySelectorAll('.mcq-opt');
  const fb = document.getElementById('fb');
  opts.forEach((o, i) => { o.onclick = null; if (i === ch.correct) o.classList.add('ok'); if (i === selMCQ && i !== ch.correct) o.classList.add('bad'); });
  if (selMCQ === ch.correct) {
    SFX.coin();
    fb.className = 'fb show win'; fb.innerHTML = '✓ Correct!';
    results.push(true);
  } else {
    fb.className = 'fb show lose'; fb.innerHTML = `✗ Not quite. <div class="hint">${ch.hint}</div>`;
    results.push(false);
  }
  const btn = document.getElementById('mcqBtn');
  btn.textContent = 'Next →'; btn.disabled = false; btn.onclick = nextCh;
}

function renderFill(ch, el) {
  el.innerHTML = `
    <div class="ch-card">
      <h3>Fill in the blank</h3>
      <p>${ch.question}</p>
      <div style="font-family:'JetBrains Mono',monospace;font-size:0.85rem;background:var(--code-bg);padding:14px;border-radius:8px;line-height:2;">
        ${ch.codeBefore}<input type="text" class="fill-inp" id="fillI" autocomplete="off" spellcheck="false">${ch.codeAfter}
      </div>
      <div class="btn-row" style="margin-top:14px;"><button class="btn btn-p" onclick="checkFill()">Check</button></div>
      <div class="fb" id="fb"></div>
    </div>
  `;
  document.getElementById('fillI').addEventListener('keydown', e => { if (e.key === 'Enter') checkFill(); });
}

function checkFill() {
  const ch = LEVELS[curLevel].challenges[curCh];
  const inp = document.getElementById('fillI');
  const fb = document.getElementById('fb');
  if (ch.accept.includes(inp.value.trim())) {
    SFX.coin(); inp.classList.add('ok');
    fb.className = 'fb show win'; fb.innerHTML = '✓ Perfect!';
    results.push(true); setTimeout(nextCh, 700);
  } else {
    inp.classList.add('bad'); setTimeout(() => inp.classList.remove('bad'), 350);
    fb.className = 'fb show lose'; fb.innerHTML = `✗ Try again. <div class="hint">${ch.hint}</div>`;
    results.push(false);
  }
}

function renderCode(ch, el) {
  el.innerHTML = `
    <div class="ch-card">
      <h3>Write Code</h3>
      <p>${ch.question.replace(/\n/g,'<br>')}</p>
      <textarea class="code-editor" id="codeI" spellcheck="false">${ch.starter}</textarea>
      <div class="console" id="out">Output will appear here...</div>
      <div class="btn-row">
        <button class="btn btn-p" onclick="runCode()">▶ Run & Check</button>
        <button class="btn btn-s" onclick="showHint()">💡 Hint</button>
      </div>
      <div class="fb" id="fb"></div>
    </div>
  `;
  document.getElementById('codeI').addEventListener('keydown', e => {
    if (e.key === 'Tab') { e.preventDefault(); const t = e.target, s = t.selectionStart; t.value = t.value.substring(0,s)+'  '+t.value.substring(t.selectionEnd); t.selectionStart=t.selectionEnd=s+2; }
  });
}

function runCode() {
  const ch = LEVELS[curLevel].challenges[curCh];
  const code = document.getElementById('codeI').value;
  const out = document.getElementById('out');
  const fb = document.getElementById('fb');
  const ed = document.getElementById('codeI');

  let result;
  if (ch.setup) {
    // DOM challenge: create an iframe-like environment
    const iframe = document.createElement('iframe');
    iframe.style.display = 'none';
    document.body.appendChild(iframe);
    iframe.contentDocument.body.innerHTML = ch.setup;
    result = ch.validate(code, iframe.contentDocument);
    document.body.removeChild(iframe);
  } else {
    let logs = [];
    const origLog = console.log;
    console.log = (...a) => logs.push(a.map(x => typeof x === 'object' ? JSON.stringify(x) : String(x)).join(' '));
    try {
      result = ch.validate(code);
    } catch(e) { result = { pass: false, msg: e.message }; }
    console.log = origLog;
    out.innerHTML = logs.length ? logs.map(l => `<div style="color:var(--text-dim)">&gt; ${l}</div>`).join('') : '<span style="color:var(--text-dim)">No output</span>';
  }

  if (result.pass) {
    SFX.coin(); ed.classList.add('ok');
    fb.className = 'fb show win'; fb.innerHTML = '✓ All tests passed!';
    results.push(true); setTimeout(nextCh, 1000);
  } else {
    ed.classList.add('bad'); setTimeout(() => ed.classList.remove('bad'), 350);
    fb.className = 'fb show lose'; fb.innerHTML = `✗ ${result.msg}`;
    results.push(false);
  }
}

function showHint() {
  const ch = LEVELS[curLevel].challenges[curCh];
  const fb = document.getElementById('fb');
  fb.className = 'fb show'; fb.style.cssText = 'background:rgba(245,158,11,0.1);border:1px solid var(--orange);color:var(--orange);display:block;';
  fb.innerHTML = `💡 ${ch.hint}`;
}

function nextCh() {
  curCh++;
  if (curCh >= LEVELS[curLevel].challenges.length) { completeLevel(); return; }
  renderCh();
}

function completeLevel() {
  const lv = LEVELS[curLevel];
  const correct = results.filter(Boolean).length;
  const total = results.length || 1;
  const ratio = correct / total;
  let stars = ratio >= 0.9 ? 3 : ratio >= 0.6 ? 2 : 1;

  S.done[lv.id] = true;
  if (stars > (S.stars[lv.id] || 0)) S.stars[lv.id] = stars;
  addXP(lv.xp);
  save();
  SFX.levelUp();
  spawnParts();

  const rewardNames = {
    dashboard: '🏎️ Car Dashboard Unlocked!',
    controls: '🎮 Controllable Car Unlocked!',
    racer: '💨 Dodge Racer Game Unlocked!',
    tuner: '🔧 Car Tuner Unlocked!',
    garage: '🏪 Garage Manager Unlocked!',
    fullgame: '🏁 FULL RACING GAME UNLOCKED!'
  };

  document.getElementById('celE').textContent = ['🎉','🚀','🏆'][stars-1];
  document.getElementById('celT').textContent = 'Level Complete!';
  document.getElementById('celD').textContent = `${correct}/${total} challenges correct — ${stars} star${stars>1?'s':''}!`;
  document.getElementById('celXP').textContent = `+${lv.xp} XP`;
  document.getElementById('celR').textContent = rewardNames[lv.reward] || '';
  document.getElementById('cel').classList.add('show');

  const celBtn = document.getElementById('celBtn');
  if (lv.reward) {
    celBtn.textContent = '🎮 Play Reward!';
    celBtn.onclick = () => { document.getElementById('cel').classList.remove('show'); showReward(lv.reward); };
  } else {
    celBtn.textContent = 'Continue';
    celBtn.onclick = () => { document.getElementById('cel').classList.remove('show'); goMap(); };
  }
}

function spawnParts() {
  const em = ['🏎️','🏍️','💨','⭐','🔥','🏁','🏆'];
  for (let i = 0; i < 18; i++) {
    const p = document.createElement('div'); p.className = 'particle';
    p.textContent = em[Math.floor(Math.random()*em.length)];
    p.style.left = Math.random()*window.innerWidth+'px';
    p.style.top = Math.random()*window.innerHeight*0.3+'px';
    p.style.fontSize = (14+Math.random()*18)+'px';
    p.style.animationDelay = Math.random()*0.5+'s';
    document.body.appendChild(p); setTimeout(() => p.remove(), 2000);
  }
}

function showReward(type) {
  document.getElementById('mapView').classList.remove('active');
  document.getElementById('chView').classList.remove('active');
  document.getElementById('gameView').classList.add('active');

  const el = document.getElementById('gameContent');

  switch(type) {
    case 'dashboard': buildDashboard(el); break;
    case 'controls': buildControls(el); break;
    case 'racer': buildRacer(el); break;
    case 'tuner': buildTuner(el); break;
    case 'garage': buildGarage(el); break;
    case 'fullgame': buildFullGame(el); break;
  }
}

// ── Reward 1: Interactive Dashboard ──
function buildDashboard(el) {
  el.innerHTML = `
    <div class="story-card">
      <h2>🏎️ Your Car Dashboard</h2>
      <p>Click the pedals to see the dashboard respond in real-time!</p>
    </div>
    <div class="dashboard" id="dash">
      <div class="dash-row">
        <div class="gauge"><canvas id="speedGauge" width="120" height="120"></canvas><div class="gauge-label">Speed</div><div class="gauge-value" id="speedVal">0</div></div>
        <div class="gauge"><canvas id="rpmGauge" width="120" height="120"></canvas><div class="gauge-label">RPM</div><div class="gauge-value" id="rpmVal">0</div></div>
        <div class="gauge"><canvas id="fuelGauge" width="120" height="120"></canvas><div class="gauge-label">Fuel</div><div class="gauge-value" id="fuelVal">100</div></div>
      </div>
    </div>
    <div class="btn-row" style="justify-content:center;gap:14px;">
      <button class="btn btn-p" id="gasBtn" style="font-size:1.2rem;padding:14px 28px;">🏎️ GAS</button>
      <button class="btn btn-s" id="brakeBtn" style="font-size:1.2rem;padding:14px 28px;">🛑 BRAKE</button>
      <button class="btn btn-s" id="honkBtn" style="font-size:1.2rem;padding:14px 28px;">📯 HONK</button>
    </div>
  `;

  let speed = 0, rpm = 0, fuel = 100;

  function drawGauge(canvasId, value, max, color) {
    const c = document.getElementById(canvasId);
    if (!c) return;
    const ctx = c.getContext('2d');
    ctx.clearRect(0, 0, 120, 120);
    // Track
    ctx.beginPath(); ctx.arc(60, 60, 48, 0.75 * Math.PI, 0.25 * Math.PI);
    ctx.strokeStyle = '#2a2a40'; ctx.lineWidth = 10; ctx.lineCap = 'round'; ctx.stroke();
    // Fill
    const pct = value / max;
    const startA = 0.75 * Math.PI;
    const endA = startA + pct * 1.5 * Math.PI;
    ctx.beginPath(); ctx.arc(60, 60, 48, startA, endA);
    ctx.strokeStyle = color; ctx.lineWidth = 10; ctx.lineCap = 'round'; ctx.stroke();
  }

  function update() {
    if (fuel > 0) fuel = Math.max(0, fuel - speed * 0.001);
    if (fuel <= 0) { speed = 0; rpm = 0; }
    rpm = speed * 40;
    drawGauge('speedGauge', speed, 240, '#e63946');
    drawGauge('rpmGauge', rpm, 9000, '#f59e0b');
    drawGauge('fuelGauge', fuel, 100, '#10b981');
    const sv = document.getElementById('speedVal');
    const rv = document.getElementById('rpmVal');
    const fv = document.getElementById('fuelVal');
    if (sv) sv.textContent = Math.round(speed);
    if (rv) rv.textContent = Math.round(rpm);
    if (fv) fv.textContent = Math.round(fuel);
    window._gameRAF = requestAnimationFrame(update);
  }

  document.getElementById('gasBtn').addEventListener('mousedown', () => { if (fuel > 0) { speed = Math.min(240, speed + 15); SFX.engine(speed/240); } });
  document.getElementById('brakeBtn').addEventListener('mousedown', () => { speed = Math.max(0, speed - 25); if (speed > 10) SFX.screech(); });
  document.getElementById('honkBtn').addEventListener('click', () => SFX.honk());

  // Auto decel
  setInterval(() => { if (speed > 0) speed = Math.max(0, speed - 2); }, 100);
  update();
}

// ── Reward 3: Dodge Racer ──
function buildRacer(el) {
  el.innerHTML = `
    <div class="game-container">
      <div class="game-titlebar">
        <h3>DODGE RACER</h3>
        <div class="game-stats">Score: <span id="rScore">0</span> &nbsp; Best: <span id="rBest">${localStorage.getItem('jsq_best')||0}</span></div>
      </div>
      <canvas id="gameCanvas" width="400" height="550"></canvas>
      <div class="game-controls-info">
        <span><kbd>←</kbd><kbd>→</kbd> Dodge &nbsp; <kbd>↑</kbd> Speed up &nbsp; <kbd>Space</kbd> Honk at obstacles</span>
        <button class="btn-sm" id="rStart">START</button>
      </div>
    </div>
  `;

  const canvas = document.getElementById('gameCanvas');
  const ctx = canvas.getContext('2d');
  let carX = 180, speed = 3, score = 0, alive = false, obstacles = [], roadOff = 0, coins = [];
  const keys = {};
  const kd = (e) => { keys[e.key] = true; if (['ArrowUp','ArrowDown','ArrowLeft','ArrowRight',' '].includes(e.key)) e.preventDefault(); if (e.key === ' ') SFX.honk(); };
  const ku = (e) => { keys[e.key] = false; };
  document.addEventListener('keydown', kd);
  document.addEventListener('keyup', ku);

  document.getElementById('rStart').onclick = () => {
    carX = 180; speed = 3; score = 0; alive = true;
    obstacles = []; coins = [];
    document.getElementById('rStart').textContent = 'RESTART';
    SFX.engine(0.5);
  };

  let frame = 0;
  function loop() {
    frame++;
    ctx.fillStyle = '#0a0a14'; ctx.fillRect(0, 0, 400, 550);

    if (alive) {
      if (keys['ArrowLeft']) carX = Math.max(75, carX - 5);
      if (keys['ArrowRight']) carX = Math.min(325, carX + 5);
      if (keys['ArrowUp']) speed = Math.min(10, speed + 0.1);

      speed += 0.001; // gradually increase difficulty
      roadOff = (roadOff + speed * 2) % 40;

      // Spawn obstacles
      if (frame % Math.max(20, 50 - Math.floor(speed * 3)) === 0) {
        obstacles.push({ x: 70 + Math.random() * 240, y: -40, w: 36, h: 56, color: ['#3b82f6','#8b5cf6','#06b6d4'][Math.floor(Math.random()*3)] });
      }
      // Spawn coins
      if (frame % 45 === 0) {
        coins.push({ x: 80 + Math.random() * 230, y: -20 });
      }

      // Move obstacles
      obstacles.forEach(o => o.y += speed * 1.5);
      obstacles = obstacles.filter(o => o.y < 600);
      coins.forEach(c => c.y += speed * 1.2);
      coins = coins.filter(c => c.y < 600);

      // Collision check
      const carRect = { x: carX - 18, y: 430, width: 36, height: 56 };
      for (const o of obstacles) {
        const oRect = { x: o.x - o.w/2, y: o.y - o.h/2, width: o.w, height: o.h };
        if (carRect.x < oRect.x + oRect.width && carRect.x + carRect.width > oRect.x &&
            carRect.y < oRect.y + oRect.height && carRect.y + carRect.height > oRect.y) {
          alive = false; SFX.crash();
          const best = parseInt(localStorage.getItem('jsq_best') || 0);
          if (score > best) localStorage.setItem('jsq_best', score);
          document.getElementById('rBest').textContent = Math.max(score, best);
          break;
        }
      }

      // Coin collection
      coins = coins.filter(c => {
        if (Math.abs(c.x - carX) < 25 && Math.abs(c.y - 450) < 30) {
          score += 10; SFX.coin(); return false;
        }
        return true;
      });

      score += Math.floor(speed * 0.1);
      document.getElementById('rScore').textContent = score;

      if (frame % 6 === 0 && speed > 2) SFX.engine(speed/10, 0.04);
    }

    // Draw road
    ctx.fillStyle = '#2d2d3d'; ctx.fillRect(60, 0, 280, 550);
    ctx.strokeStyle = '#f59e0b'; ctx.lineWidth = 2; ctx.setLineDash([20, 15]);
    ctx.lineDashOffset = -roadOff;
    [140, 200, 260].forEach(lx => { ctx.beginPath(); ctx.moveTo(lx, 0); ctx.lineTo(lx, 550); ctx.stroke(); });
    ctx.setLineDash([]);
    ctx.strokeStyle = '#fff'; ctx.lineWidth = 3;
    ctx.beginPath(); ctx.moveTo(60, 0); ctx.lineTo(60, 550); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(340, 0); ctx.lineTo(340, 550); ctx.stroke();

    // Draw obstacles (other cars)
    obstacles.forEach(o => drawCarTopDown(ctx, o.x, o.y, o.w, o.h, o.color));

    // Draw coins
    coins.forEach(c => {
      ctx.fillStyle = '#fbbf24';
      ctx.beginPath(); ctx.arc(c.x, c.y, 8, 0, Math.PI * 2); ctx.fill();
      ctx.fillStyle = '#92400e'; ctx.font = 'bold 10px sans-serif'; ctx.textAlign = 'center';
      ctx.fillText('$', c.x, c.y + 3.5);
    });

    // Draw player
    drawCarTopDown(ctx, carX, 450, 36, 56, '#e63946');

    // Speed indicator
    ctx.fillStyle = '#fff'; ctx.font = 'bold 13px Orbitron, monospace'; ctx.textAlign = 'left';
    ctx.fillText(`${Math.round(speed * 30)} km/h`, 8, 22);

    if (!alive && frame > 10) {
      ctx.fillStyle = 'rgba(0,0,0,0.6)'; ctx.fillRect(0, 200, 400, 150);
      ctx.fillStyle = '#e63946'; ctx.font = 'bold 28px Orbitron, monospace'; ctx.textAlign = 'center';
      ctx.fillText('CRASHED!', 200, 260);
      ctx.fillStyle = '#fff'; ctx.font = '16px Inter, sans-serif';
      ctx.fillText(`Score: ${score}`, 200, 295);
      ctx.fillStyle = '#94a3b8'; ctx.font = '13px Inter, sans-serif';
      ctx.fillText('Press START to try again', 200, 325);
    }

    window._gameRAF = requestAnimationFrame(loop);
  }

  const origGoMap = window.goMap;
  window.goMap = () => { document.removeEventListener('keydown', kd); document.removeEventListener('keyup', ku); origGoMap(); window.goMap = origGoMap; };

  loop();
}

function buildTuner(el) {
  el.innerHTML = `
    <div class="story-card">

      <div style="padding:16px;display:flex;flex-direction:column;gap:12px;">

        <label style="color:var(--text-dim);font-size:0.85rem;">Car Color: <input type="color" id="tColor" value="#e63946"></label>
        <label style="color:var(--text-dim);font-size:0.85rem;">Turbo: <input type="checkbox" id="tTurbo"> <span id="tTurboLabel">Off</span></label>
        <label style="color:var(--text-dim);font-size:0.85rem;">Exhaust Sound: <input type="range" id="tExhaust" min="1" max="10" value="5" style="width:200px;"> <span id="tExhaustVal">5</span></label>
        <button class="btn btn-p" id="tRevBtn" style="width:fit-content;">🔊 Rev Engine!</button>
      </div>
    </div>
  `;

  const canvas = document.getElementById('gameCanvas');
  const ctx = canvas.getContext('2d');
  let shake = 0, color = '#e63946', turbo = false, power = 150;

  function draw() {
    ctx.clearRect(0, 0, 400, 300);
    ctx.fillStyle = '#0a0a14'; ctx.fillRect(0, 0, 400, 300);

    const sx = (Math.random() - 0.5) * shake;
    const sy = (Math.random() - 0.5) * shake;

    // Draw car (side view style)
    ctx.save(); ctx.translate(200 + sx, 180 + sy);

    // Body
    ctx.fillStyle = color;
    ctx.beginPath();
    ctx.moveTo(-80, 0); ctx.lineTo(-60, -40); ctx.lineTo(30, -40);
    ctx.lineTo(70, -10); ctx.lineTo(80, 0); ctx.lineTo(80, 20);
    ctx.lineTo(-80, 20); ctx.closePath(); ctx.fill();

    // Windows
    ctx.fillStyle = 'rgba(100,200,255,0.3)';
    ctx.beginPath(); ctx.moveTo(-55, -38); ctx.lineTo(-20, -38); ctx.lineTo(-20, -5); ctx.lineTo(-55, -5); ctx.closePath(); ctx.fill();
    ctx.beginPath(); ctx.moveTo(-15, -38); ctx.lineTo(25, -38); ctx.lineTo(55, -10); ctx.lineTo(-15, -5); ctx.closePath(); ctx.fill();

    // Wheels
    ctx.fillStyle = '#333';
    ctx.beginPath(); ctx.arc(-45, 25, 18, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(50, 25, 18, 0, Math.PI*2); ctx.fill();
    ctx.fillStyle = '#666';
    ctx.beginPath(); ctx.arc(-45, 25, 10, 0, Math.PI*2); ctx.fill();
    ctx.beginPath(); ctx.arc(50, 25, 10, 0, Math.PI*2); ctx.fill();

    // Turbo flame
    if (turbo && shake > 0.5) {
      ctx.fillStyle = `hsl(${30 + Math.random()*20}, 100%, ${50 + Math.random()*30}%)`;
      const fl = 15 + Math.random() * power * 0.1;
      ctx.beginPath(); ctx.moveTo(-80, 5); ctx.lineTo(-80 - fl, 10);
      ctx.lineTo(-80, 15); ctx.closePath(); ctx.fill();
    }

    // Headlights glow
    ctx.fillStyle = 'rgba(255,215,0,0.6)';
    ctx.beginPath(); ctx.arc(78, -3, 5, 0, Math.PI*2); ctx.fill();

    ctx.restore();

    // Power text
    ctx.fillStyle = '#fff'; ctx.font = 'bold 14px Orbitron, monospace'; ctx.textAlign = 'center';
    ctx.fillText(`${power} HP ${turbo ? '+ TURBO 🔥' : ''}`, 200, 30);

    shake *= 0.95;
    window._gameRAF = requestAnimationFrame(draw);
  }

  document.getElementById('tPower').oninput = (e) => { power = parseInt(e.target.value); document.getElementById('tPowerVal').textContent = power; };
  document.getElementById('tColor').oninput = (e) => { color = e.target.value; };
  document.getElementById('tTurbo').onchange = (e) => { turbo = e.target.checked; document.getElementById('tTurboLabel').textContent = turbo ? 'ON 🔥' : 'Off'; };
  document.getElementById('tRevBtn').onclick = () => {
    const exhaust = parseInt(document.getElementById('tExhaust').value);
    shake = power * 0.03;
    SFX.engine(power / 500, 0.2 + exhaust * 0.05);
    if (turbo) { setTimeout(() => SFX.boost(), 200); }
  };
  document.getElementById('tExhaust').oninput = (e) => { document.getElementById('tExhaustVal').textContent = e.target.value; };

  draw();
}

    const names = ['Viper', 'Phantom', 'Blaze', 'Shadow', 'Rocket', 'Storm'];

      name: names[Math.floor(Math.random() * names.length)] + ' ' + (garage.length + 1),

      color: '#' + Math.floor(Math.random()*16777215).toString(16).padStart(6, '0'),
      turbo: false
    };
    garage = [...garage, newCar];
    selected = garage.length - 1;
    SFX.coin(); render();
  };
  window._upgradeCar = () => {
    garage = garage.map((c, i) => i === selected ? { ...c, hp: c.hp + 50 } : c);
    SFX.boost(); render();
  };
  window._toggleTurbo = () => {
    garage = garage.map((c, i) => i === selected ? { ...c, turbo: !c.turbo } : c);
    SFX.engine(0.7); render();

  window._paintCar = () => {
    const color = '#' + Math.floor(Math.random()*16777215).toString(16).padStart(6, '0');

    garage = garage.filter((_, i) => i !== selected);
    selected = Math.min(selected, garage.length - 1);

  };

  render();
}

function buildFullGame(el) {

  const W = 400, H = 550;
  let state = { alive: false, score: 0, combo: 0, multiplier: 1, speed: 3, carX: 200, isBike: false, obstacles: [], coins: [], boostFuel: 100, boosting: false, roadOff: 0, frame: 0, shake: 0 };

  const keys = {};
  const kd = (e) => {
    keys[e.key] = true;
    if (['ArrowUp','ArrowDown','ArrowLeft','ArrowRight',' '].includes(e.key)) e.preventDefault();
    if (e.key === ' ') SFX.honk();
    if (e.key === 'b' || e.key === 'B') state.isBike = !state.isBike;
  };
  const ku = (e) => { keys[e.key] = false; };
  document.addEventListener('keydown', kd);
  document.addEventListener('keyup', ku);

  document.getElementById('fStart').onclick = () => {

    document.getElementById('fStart').textContent = '🔄 RESTART';

  function loop() {

      }
      if (s.frame % 35 === 0) s.coins.push({ x: 80 + Math.random() * 230, y: -20 });

      // Move
      s.obstacles.forEach(o => o.y += s.speed * 1.6);
      s.obstacles = s.obstacles.filter(o => {
        if (o.y > H + 50) { s.combo++; if (s.combo >= 10) s.multiplier = 3; else if (s.combo >= 5) s.multiplier = 2; return false; }
        return true;
      });
      s.coins.forEach(c => c.y += s.speed * 1.3);
      s.coins = s.coins.filter(c => c.y < H + 30);

      // Collision
      const pw = s.isBike ? 14 : 34, ph = s.isBike ? 44 : 52;
      const pr = { x: s.carX - pw/2, y: 440 - ph/2, width: pw, height: ph };
      for (const o of s.obstacles) {
        const or = { x: o.x - o.w/2, y: o.y - o.h/2, width: o.w, height: o.h };
        if (pr.x < or.x + or.width && pr.x + pr.width > or.x && pr.y < or.y + or.height && pr.y + pr.height > or.y) {
          s.alive = false; s.shake = 10; SFX.crash();
          const best = parseInt(localStorage.getItem('jsq_fullbest') || 0);
          if (s.score > best) localStorage.setItem('jsq_fullbest', s.score);
          document.getElementById('fBest').textContent = Math.max(s.score, best);
          break;
        }
      }

      // Coin pickup
      s.coins = s.coins.filter(c => {
        if (Math.abs(c.x - s.carX) < 22 && Math.abs(c.y - 440) < 28) {
          s.score += 10 * s.multiplier; s.combo++;
          if (s.combo >= 10) s.multiplier = 3; else if (s.combo >= 5) s.multiplier = 2;
          SFX.coin(); return false;
        }
        return true;
      });

      s.score += Math.floor(s.speed * 0.1 * s.multiplier);
      document.getElementById('fScore').textContent = s.score;
      document.getElementById('fCombo').textContent = `x${s.multiplier}`;

      if (s.frame % 8 === 0 && s.speed > 2) SFX.engine(s.speed/12, 0.03);
      if (s.boosting && s.frame % 15 === 0) SFX.boost();
    }

    // ── DRAW ──
    const sx = (Math.random()-0.5) * s.shake;
    const sy = (Math.random()-0.5) * s.shake;
    s.shake *= 0.9;

    ctx.save(); ctx.translate(sx, sy);
    ctx.fillStyle = '#0a0a14'; ctx.fillRect(0, 0, W, H);

    // Road
    ctx.fillStyle = '#2d2d3d'; ctx.fillRect(55, 0, 290, H);

    // Grass details
    ctx.fillStyle = '#1a2e1a'; ctx.fillRect(0, 0, 55, H); ctx.fillRect(345, 0, 55, H);

    // Lane lines
    ctx.strokeStyle = '#f59e0b44'; ctx.lineWidth = 2; ctx.setLineDash([20, 15]);
    ctx.lineDashOffset = -s.roadOff;
    [125, 200, 275].forEach(x => { ctx.beginPath(); ctx.moveTo(x, 0); ctx.lineTo(x, H); ctx.stroke(); });
    ctx.setLineDash([]);

    // Edge lines
    ctx.strokeStyle = '#ffffff88'; ctx.lineWidth = 3;
    ctx.beginPath(); ctx.moveTo(55, 0); ctx.lineTo(55, H); ctx.stroke();
    ctx.beginPath(); ctx.moveTo(345, 0); ctx.lineTo(345, H); ctx.stroke();

    // Obstacles
    s.obstacles.forEach(o => drawCarTopDown(ctx, o.x, o.y, o.w, o.h, o.color));

    // Coins
    s.coins.forEach(c => {
      ctx.fillStyle = '#fbbf24';
      ctx.beginPath(); ctx.arc(c.x, c.y, 9, 0, Math.PI*2); ctx.fill();
      ctx.fillStyle = '#92400e'; ctx.font = 'bold 11px sans-serif'; ctx.textAlign = 'center';
      ctx.fillText('$', c.x, c.y + 4);
    });

    // Player
    if (s.isBike) {
      drawBikeTopDown(ctx, s.carX, 440, 44, '#e63946');
    } else {
      drawCarTopDown(ctx, s.carX, 440, 34, 52, '#e63946');
    }

    // Boost flame
    if (s.boosting && s.alive) {
      ctx.fillStyle = `hsl(${25+Math.random()*15}, 100%, ${50+Math.random()*30}%)`;
      const fl = 10 + Math.random() * 15;
      ctx.beginPath(); ctx.moveTo(s.carX - 6, 468); ctx.lineTo(s.carX, 468 + fl);
      ctx.lineTo(s.carX + 6, 468); ctx.closePath(); ctx.fill();
    }

    // HUD
    ctx.fillStyle = '#fff'; ctx.font = 'bold 13px Orbitron, monospace'; ctx.textAlign = 'left';
    ctx.fillText(`${Math.round(s.speed * 30)} km/h`, 8, 22);
    if (s.multiplier > 1) { ctx.fillStyle = s.multiplier >= 3 ? '#f59e0b' : '#10b981'; ctx.fillText(`COMBO x${s.multiplier}`, 8, 42); }

    // Boost bar
    ctx.fillStyle = '#333'; ctx.fillRect(W - 25, 10, 12, 100);
    ctx.fillStyle = s.boosting ? '#f59e0b' : '#3b82f6';
    ctx.fillRect(W - 25, 10 + (100 - s.boostFuel), 12, s.boostFuel);
    ctx.fillStyle = '#fff'; ctx.font = '8px sans-serif'; ctx.textAlign = 'center';
    ctx.fillText('NOS', W - 19, 122);

    // Game over
    if (!s.alive && s.frame > 10) {
      ctx.fillStyle = 'rgba(0,0,0,0.65)'; ctx.fillRect(0, 180, W, 180);
      ctx.fillStyle = '#e63946'; ctx.font = 'bold 32px Orbitron, monospace'; ctx.textAlign = 'center';
      ctx.fillText('WRECKED!', W/2, 240);
      ctx.fillStyle = '#fff'; ctx.font = '18px Inter, sans-serif';
      ctx.fillText(`Score: ${s.score}`, W/2, 275);
      ctx.fillStyle = '#94a3b8'; ctx.font = '13px Inter, sans-serif';
      ctx.fillText(`${s.isBike ? '🏍️ Bike' : '🏎️ Car'} mode  •  Press RACE to retry`, W/2, 305);
      ctx.fillText(`Tip: Press B to switch vehicle!`, W/2, 330);
    }

    ctx.restore();
    window._gameRAF = requestAnimationFrame(loop);
  }

  const origGoMap = window.goMap;
  window.goMap = () => { document.removeEventListener('keydown', kd); document.removeEventListener('keyup', ku); origGoMap(); window.goMap = origGoMap; };

  loop();
}

// ── Init ──
goMap();
updateBar();
</script>
