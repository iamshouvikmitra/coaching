<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>JS Quest Ch.2 — Speed Racer</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;700&family=Inter:wght@400;600;700;900&family=Orbitron:wght@700;900&display=swap');
    * { margin: 0; padding: 0; box-sizing: border-box; }
    :root {
      --bg: #0a0a12; --surface: #141422; --surface2: #1c1c30;
      --accent: #e63946; --accent-glow: #ff6b6b;
      --green: #10b981; --green-glow: #34d399;
      --blue: #3b82f6; --orange: #f59e0b; --purple: #8b5cf6;
      --text: #e2e8f0; --text-dim: #94a3b8;
      --code-bg: #0d1117; --border: #2a2a40; --road: #2d2d3d;
    }
    body { font-family: 'Inter', sans-serif; background: var(--bg); color: var(--text); min-height: 100vh; overflow-x: hidden; }

    /* ── Top Bar ── */
    .topbar { display: flex; align-items: center; justify-content: space-between; padding: 14px 24px; background: var(--surface); border-bottom: 2px solid var(--accent); position: sticky; top: 0; z-index: 100; }
    .topbar-left { display: flex; align-items: center; gap: 16px; }
    .logo { font-family: 'Orbitron', sans-serif; font-weight: 900; font-size: 1.2rem; color: var(--accent); }
    .logo span { color: var(--text); }
    .xp-pill { display: flex; align-items: center; gap: 8px; background: var(--surface2); padding: 5px 14px; border-radius: 20px; }
    .xp-pill .val { font-family: 'Orbitron', sans-serif; font-size: 0.8rem; color: var(--orange); }
    .xp-bar-track { width: 100px; height: 6px; background: #1a1a2e; border-radius: 3px; }
    .xp-bar-fill { height: 100%; border-radius: 3px; background: linear-gradient(90deg, var(--orange), #fbbf24); transition: width 0.5s; }
    .topbar-right { display: flex; gap: 8px; }
    .btn-sm { padding: 5px 12px; border-radius: 6px; border: 1px solid var(--border); background: var(--surface2); color: var(--text-dim); cursor: pointer; font-size: 0.75rem; font-weight: 600; transition: all 0.2s; }
    .btn-sm:hover { border-color: var(--accent); color: var(--text); }

    /* ── Views ── */
    .view { display: none; max-width: 920px; margin: 0 auto; padding: 24px 20px; }
    .view.active { display: block; }

    /* ── Map ── */
    .map-header { text-align: center; margin-bottom: 32px; }
    .map-header h1 { font-family: 'Orbitron', sans-serif; font-size: 2rem; background: linear-gradient(135deg, var(--accent), var(--orange)); -webkit-background-clip: text; -webkit-text-fill-color: transparent; }
    .map-header p { color: var(--text-dim); margin-top: 6px; }
    .level-list { display: flex; flex-direction: column; align-items: center; gap: 10px; }
    .lnode { width: 320px; padding: 16px 20px; background: var(--surface); border: 2px solid var(--border); border-radius: 14px; cursor: pointer; transition: all 0.3s; display: flex; align-items: center; gap: 14px; position: relative; }
    .lnode:hover { transform: translateY(-2px); border-color: var(--accent); }
    .lnode.done { border-color: var(--green); }
    .lnode.done .licon { background: var(--green); }
    .lnode.locked { opacity: 0.35; cursor: not-allowed; }
    .lnode.locked:hover { transform: none; border-color: var(--border); }
    .lnode.cur { border-color: var(--accent); box-shadow: 0 0 24px rgba(230,57,70,0.25); }
    .licon { width: 44px; height: 44px; border-radius: 12px; background: var(--accent); display: flex; align-items: center; justify-content: center; font-size: 1.4rem; flex-shrink: 0; }
    .linfo h3 { font-size: 0.9rem; margin-bottom: 2px; }
    .linfo p { font-size: 0.72rem; color: var(--text-dim); }
    .lstars { position: absolute; right: 14px; top: 50%; transform: translateY(-50%); }
    .pipe { width: 2px; height: 16px; background: var(--border); }
    .pipe.done { background: var(--green); }

    /* ── Challenge ── */
    .ch-head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
    .back-btn { background: none; border: none; color: var(--text-dim); cursor: pointer; font-size: 0.9rem; font-weight: 600; }
    .back-btn:hover { color: var(--text); }
    .dots { display: flex; gap: 5px; }
    .dot { width: 9px; height: 9px; border-radius: 50%; background: var(--surface2); border: 1px solid var(--border); }
    .dot.ok { background: var(--green); border-color: var(--green); }
    .dot.on { background: var(--accent); border-color: var(--accent); }

    /* ── Cards ── */
    .story-card { background: linear-gradient(135deg, var(--surface), var(--surface2)); border: 1px solid var(--border); border-radius: 16px; padding: 24px; margin-bottom: 20px; }
    .story-card .emo { font-size: 2.2rem; display: block; margin-bottom: 8px; }
    .story-card h2 { font-size: 1.2rem; margin-bottom: 8px; }
    .story-card p { color: var(--text-dim); line-height: 1.65; }
    .story-card code { background: var(--code-bg); padding: 2px 6px; border-radius: 4px; font-family: 'JetBrains Mono', monospace; font-size: 0.83em; color: var(--accent-glow); }

    .ch-card { background: var(--surface); border: 1px solid var(--border); border-radius: 14px; padding: 22px; margin-bottom: 14px; }
    .ch-card h3 { margin-bottom: 10px; font-size: 1.05rem; }
    .ch-card p { color: var(--text-dim); margin-bottom: 14px; line-height: 1.5; }

    /* ── Code editor ── */
    .code-editor { width: 100%; min-height: 110px; padding: 14px; background: var(--code-bg); border: 2px solid var(--border); border-radius: 10px; color: var(--text); font-family: 'JetBrains Mono', monospace; font-size: 0.82rem; line-height: 1.6; resize: vertical; outline: none; transition: border-color 0.3s; }
    .code-editor:focus { border-color: var(--accent); }
    .code-editor.ok { border-color: var(--green) !important; }
    .code-editor.bad { border-color: #ef4444 !important; animation: shake 0.35s; }
    @keyframes shake { 0%,100% { transform: translateX(0); } 25% { transform: translateX(-5px); } 75% { transform: translateX(5px); } }

    .mcq-opts { display: flex; flex-direction: column; gap: 8px; margin-bottom: 14px; }
    .mcq-opt { padding: 12px 16px; background: var(--surface2); border: 2px solid var(--border); border-radius: 10px; cursor: pointer; font-size: 0.85rem; transition: all 0.2s; font-family: 'JetBrains Mono', monospace; }
    .mcq-opt:hover { border-color: var(--accent); }
    .mcq-opt.sel { border-color: var(--accent); background: rgba(230,57,70,0.12); }
    .mcq-opt.ok { border-color: var(--green); background: rgba(16,185,129,0.12); }
    .mcq-opt.bad { border-color: #ef4444; background: rgba(239,68,68,0.08); }

    .fill-inp { display: inline-block; width: 130px; padding: 4px 8px; background: var(--code-bg); border: 2px solid var(--border); border-radius: 6px; color: var(--accent-glow); font-family: 'JetBrains Mono', monospace; font-size: 0.83rem; text-align: center; outline: none; }
    .fill-inp:focus { border-color: var(--accent); }

    .console { background: #000; border-radius: 8px; padding: 12px; font-family: 'JetBrains Mono', monospace; font-size: 0.78rem; color: var(--green-glow); margin-bottom: 14px; min-height: 36px; border: 1px solid #222; }

    .btn-row { display: flex; gap: 10px; flex-wrap: wrap; }
    .btn { padding: 9px 22px; border-radius: 9px; border: none; font-weight: 700; font-size: 0.85rem; cursor: pointer; transition: all 0.2s; }
    .btn-p { background: linear-gradient(135deg, var(--accent), #c1121f); color: #fff; }
    .btn-p:hover { transform: translateY(-1px); box-shadow: 0 4px 14px rgba(230,57,70,0.4); }
    .btn-s { background: var(--surface2); color: var(--text); border: 1px solid var(--border); }
    .btn-s:hover { border-color: var(--accent); }
    .btn:disabled { opacity: 0.35; cursor: not-allowed; transform: none !important; }

    .fb { padding: 12px 16px; border-radius: 10px; margin-top: 14px; font-weight: 600; display: none; }
    .fb.show { display: block; animation: fadeUp 0.3s; }
    .fb.win { background: rgba(16,185,129,0.12); border: 1px solid var(--green); color: var(--green-glow); }
    .fb.lose { background: rgba(239,68,68,0.08); border: 1px solid #ef4444; color: #fca5a5; }
    .fb .hint { font-weight: 400; color: var(--text-dim); margin-top: 5px; font-size: 0.82rem; }
    @keyframes fadeUp { from { opacity: 0; transform: translateY(6px); } to { opacity: 1; transform: translateY(0); } }

    /* ── Celebration ── */
    .cel-ov { position: fixed; inset: 0; background: rgba(0,0,0,0.75); display: none; align-items: center; justify-content: center; z-index: 200; }
    .cel-ov.show { display: flex; }
    .cel-box { background: var(--surface); border: 2px solid var(--green); border-radius: 20px; padding: 36px; text-align: center; max-width: 420px; animation: popIn 0.35s; }
    @keyframes popIn { from { transform: scale(0.85); opacity: 0; } to { transform: scale(1); opacity: 1; } }
    .cel-box .big { font-size: 3.5rem; display: block; margin-bottom: 12px; }
    .cel-box h2 { font-size: 1.4rem; margin-bottom: 6px; color: var(--green-glow); }
    .cel-box p { color: var(--text-dim); margin-bottom: 16px; }
    .cel-box .xpe { font-size: 1.1rem; color: var(--orange); font-weight: 700; margin-bottom: 14px; }
    .cel-box .reward-label { display: inline-block; background: var(--surface2); border: 1px solid var(--accent); border-radius: 8px; padding: 6px 16px; font-size: 0.85rem; color: var(--accent-glow); margin-bottom: 14px; }

    .particle { position: fixed; pointer-events: none; z-index: 300; animation: pfall 1.4s ease-out forwards; }
    @keyframes pfall { 0% { opacity: 1; transform: translateY(0) rotate(0) scale(1); } 100% { opacity: 0; transform: translateY(280px) rotate(700deg) scale(0); } }

    /* ═══ INTERACTIVE STYLES ═══ */

    /* ── Live Playground (split editor + preview) ── */
    .playground { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 16px; border: 2px solid var(--border); border-radius: 12px; overflow: hidden; min-height: 200px; }
    .playground .pg-editor { background: var(--code-bg); padding: 0; position: relative; }
    .playground .pg-editor textarea { width: 100%; height: 100%; min-height: 200px; padding: 14px; background: transparent; border: none; color: var(--text); font-family: 'JetBrains Mono', monospace; font-size: 0.8rem; line-height: 1.6; resize: none; outline: none; }
    .playground .pg-preview { background: #fff; color: #111; padding: 12px; font-family: sans-serif; position: relative; overflow: auto; }
    .playground .pg-preview-label { position: absolute; top: 4px; right: 8px; font-size: 0.65rem; color: #999; text-transform: uppercase; letter-spacing: 1px; }
    .playground .pg-editor-label { position: absolute; top: 4px; right: 8px; font-size: 0.65rem; color: #555; text-transform: uppercase; letter-spacing: 1px; z-index: 1; }

    /* ── Predict the output ── */
    .predict-code { background: var(--code-bg); border: 1px solid var(--border); border-radius: 10px; padding: 16px; font-family: 'JetBrains Mono', monospace; font-size: 0.85rem; line-height: 1.7; margin-bottom: 14px; color: var(--text); white-space: pre-wrap; }
    .predict-input { width: 100%; padding: 10px 14px; background: var(--surface2); border: 2px solid var(--border); border-radius: 8px; color: var(--text); font-family: 'JetBrains Mono', monospace; font-size: 0.85rem; outline: none; }
    .predict-input:focus { border-color: var(--accent); }
    .predict-input.ok { border-color: var(--green); }
    .predict-input.bad { border-color: #ef4444; }
    .predict-reveal { background: var(--code-bg); border: 1px solid var(--green); border-radius: 8px; padding: 12px 16px; margin-top: 10px; font-family: 'JetBrains Mono', monospace; font-size: 0.85rem; color: var(--green-glow); display: none; }
    .predict-reveal.show { display: block; animation: fadeUp 0.3s; }

    /* ── Bug Fix ── */
    .bugfix-editor { width: 100%; min-height: 120px; padding: 14px; background: #1a0a0a; border: 2px solid #5c2020; border-radius: 10px; color: var(--text); font-family: 'JetBrains Mono', monospace; font-size: 0.82rem; line-height: 1.6; resize: vertical; outline: none; }
    .bugfix-editor:focus { border-color: var(--accent); }
    .bug-indicator { display: inline-block; background: #5c2020; color: #fca5a5; padding: 3px 10px; border-radius: 6px; font-size: 0.75rem; font-weight: 700; margin-bottom: 10px; }

    /* ── Reorder / drag ── */
    .reorder-container { display: flex; flex-direction: column; gap: 6px; margin-bottom: 14px; }
    .reorder-item { padding: 10px 14px; background: var(--surface2); border: 2px solid var(--border); border-radius: 8px; cursor: grab; font-family: 'JetBrains Mono', monospace; font-size: 0.82rem; user-select: none; transition: all 0.2s; display: flex; align-items: center; gap: 10px; }
    .reorder-item:active { cursor: grabbing; }
    .reorder-item.dragging { opacity: 0.4; border-color: var(--accent); }
    .reorder-item.over { border-color: var(--accent-glow); transform: scale(1.02); background: rgba(230,57,70,0.08); }
    .reorder-num { color: var(--text-dim); font-size: 0.7rem; min-width: 20px; }

    /* ── Live DOM visualizer ── */
    .dom-viz { background: var(--surface2); border: 1px solid var(--border); border-radius: 10px; padding: 16px; margin-bottom: 14px; }
    .dom-tree { font-family: 'JetBrains Mono', monospace; font-size: 0.8rem; }
    .dom-node { padding: 4px 8px; margin: 2px 0; border-radius: 4px; transition: all 0.3s; }
    .dom-node.highlight { background: rgba(230,57,70,0.2); border: 1px solid var(--accent); }
    .dom-indent { margin-left: 20px; border-left: 1px dashed var(--border); padding-left: 10px; }
    .dom-tag { color: var(--accent-glow); }
    .dom-attr { color: var(--orange); }
    .dom-text { color: var(--green-glow); }

    /* ── Variable watcher ── */
    .var-watch { display: flex; gap: 10px; flex-wrap: wrap; margin: 12px 0; }
    .var-box { background: var(--surface2); border: 1px solid var(--border); border-radius: 8px; padding: 8px 14px; min-width: 80px; text-align: center; transition: all 0.3s; }
    .var-box.changed { border-color: var(--orange); background: rgba(245,158,11,0.1); animation: pulse 0.5s; }
    @keyframes pulse { 50% { transform: scale(1.08); } }
    .var-name { font-family: 'JetBrains Mono', monospace; font-size: 0.7rem; color: var(--text-dim); margin-bottom: 4px; }
    .var-val { font-family: 'Orbitron', sans-serif; font-size: 1rem; color: var(--accent-glow); }

    /* ── Step through debugger ── */
    .step-container { margin-bottom: 14px; }
    .step-line { padding: 6px 12px; font-family: 'JetBrains Mono', monospace; font-size: 0.82rem; line-height: 1.6; border-left: 3px solid transparent; transition: all 0.3s; cursor: default; }
    .step-line.active { background: rgba(230,57,70,0.12); border-left-color: var(--accent); }
    .step-line.done { opacity: 0.5; }
    .step-controls { display: flex; gap: 8px; align-items: center; margin-top: 10px; }
    .step-btn { padding: 6px 16px; border-radius: 6px; border: 1px solid var(--border); background: var(--surface2); color: var(--text); cursor: pointer; font-weight: 600; font-size: 0.8rem; }
    .step-btn:hover { border-color: var(--accent); }
    .step-btn.primary { background: var(--accent); border-color: var(--accent); color: #fff; }

    /* ── Interactive teach block ── */
    .teach-interactive { background: var(--code-bg); border: 1px solid var(--border); border-radius: 12px; overflow: hidden; margin-bottom: 20px; }
    .teach-interactive h3 { color: var(--green-glow); font-size: 0.8rem; text-transform: uppercase; letter-spacing: 1px; padding: 14px 18px 0; }
    .teach-interactive .ti-code { padding: 10px 18px; font-family: 'JetBrains Mono', monospace; font-size: 0.82rem; line-height: 1.7; }
    .teach-interactive .ti-tryit { background: var(--surface2); border-top: 1px solid var(--border); padding: 12px 18px; }
    .teach-interactive .ti-tryit-label { font-size: 0.72rem; text-transform: uppercase; letter-spacing: 1px; color: var(--orange); font-weight: 700; margin-bottom: 8px; }

    /* ── Mini game styles ── */
    .game-container { background: var(--surface); border: 2px solid var(--accent); border-radius: 16px; overflow: hidden; margin-bottom: 20px; }
    .game-titlebar { display: flex; justify-content: space-between; align-items: center; padding: 10px 16px; background: var(--surface2); border-bottom: 1px solid var(--border); }
    .game-titlebar h3 { font-family: 'Orbitron', sans-serif; font-size: 0.85rem; color: var(--accent); }
    .game-titlebar .game-stats { display: flex; gap: 14px; font-size: 0.8rem; color: var(--text-dim); }
    .game-titlebar .game-stats span { font-family: 'Orbitron', sans-serif; color: var(--orange); }
    canvas#gameCanvas { display: block; width: 100%; background: var(--road); }
    .game-controls-info { padding: 10px 16px; background: var(--surface2); border-top: 1px solid var(--border); font-size: 0.75rem; color: var(--text-dim); display: flex; justify-content: space-between; align-items: center; }
    .game-controls-info kbd { background: var(--code-bg); padding: 2px 8px; border-radius: 4px; border: 1px solid var(--border); font-family: 'JetBrains Mono', monospace; font-size: 0.7rem; }
    .dashboard { background: linear-gradient(180deg, #111120, #0a0a14); border: 2px solid var(--border); border-radius: 16px; padding: 24px; margin-bottom: 20px; }
    .dash-row { display: flex; gap: 20px; justify-content: center; flex-wrap: wrap; }
    .gauge { width: 140px; text-align: center; }
    .gauge canvas { display: block; margin: 0 auto 8px; }
    .gauge-label { font-family: 'Orbitron', sans-serif; font-size: 0.7rem; color: var(--text-dim); text-transform: uppercase; letter-spacing: 1px; }
    .gauge-value { font-family: 'Orbitron', sans-serif; font-size: 1.4rem; color: var(--accent); }

    .hl { color: #a78bfa; } .cm { color: #6b7280; } .st { color: #34d399; }
    .kw { color: #f472b6; } .nm { color: #f59e0b; }

    @media (max-width: 700px) {
      .topbar { flex-wrap: wrap; gap: 6px; }
      .lnode { width: 100%; }
      .view { padding: 14px 10px; }
      .playground { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

<div class="topbar">
  <div class="topbar-left">
    <div class="logo">SPEED <span>RACER</span></div>
    <div class="xp-pill">
      <span class="val" id="xpLabel">0 XP</span>
      <div class="xp-bar-track"><div class="xp-bar-fill" id="xpBar" style="width:0%"></div></div>
    </div>
  </div>
  <div class="topbar-right">
    <a href="jsquest.html" class="btn-sm" style="text-decoration:none;">Ch.1</a>
    <button class="btn-sm" onclick="resetAll()">Reset</button>
  </div>
</div>

<div class="view active" id="mapView">
  <div class="map-header">
    <h1>Chapter 2: Speed Racer</h1>
    <p>Learn intermediate JS by building a racing game — piece by piece</p>
  </div>
  <div class="level-list" id="levelList"></div>
</div>

<div class="view" id="chView">
  <div class="ch-head">
    <button class="back-btn" onclick="goMap()">&#8592; Back to Map</button>
    <div class="dots" id="dots"></div>
  </div>
  <div id="chContent"></div>
</div>

<div class="view" id="gameView">
  <div class="ch-head">
    <button class="back-btn" onclick="goMap()">&#8592; Back to Map</button>
    <div style="font-family:'Orbitron',sans-serif;font-size:0.85rem;color:var(--accent);">REWARD UNLOCKED</div>
  </div>
  <div id="gameContent"></div>
</div>

<div class="cel-ov" id="cel">
  <div class="cel-box">
    <span class="big" id="celE"></span>
    <h2 id="celT"></h2>
    <p id="celD"></p>
    <div class="xpe" id="celXP"></div>
    <div class="reward-label" id="celR"></div><br><br>
    <button class="btn btn-p" id="celBtn">Play Reward!</button>
  </div>
</div>

<script>
// ═══════════════════════════════════════
//  SOUND ENGINE
// ═══════════════════════════════════════
const AudioCtx = window.AudioContext || window.webkitAudioContext;
let audioCtx;
function getAudio() { if (!audioCtx) audioCtx = new AudioCtx(); return audioCtx; }

const SFX = {
  engine(speed = 0.5, duration = 0.3) {
    const ctx = getAudio(), osc = ctx.createOscillator(), g = ctx.createGain();
    osc.type = 'sawtooth';
    osc.frequency.setValueAtTime(60 + speed * 200, ctx.currentTime);
    osc.frequency.linearRampToValueAtTime(80 + speed * 280, ctx.currentTime + duration);
    g.gain.setValueAtTime(0.08, ctx.currentTime);
    g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + duration);
    osc.connect(g).connect(ctx.destination); osc.start(); osc.stop(ctx.currentTime + duration);
  },
  honk() {
    const ctx = getAudio(), o1 = ctx.createOscillator(), o2 = ctx.createOscillator(), g = ctx.createGain();
    o1.type = 'square'; o1.frequency.value = 340; o2.type = 'square'; o2.frequency.value = 460;
    g.gain.setValueAtTime(0.12, ctx.currentTime); g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.4);
    o1.connect(g); o2.connect(g); g.connect(ctx.destination);
    o1.start(); o2.start(); o1.stop(ctx.currentTime + 0.4); o2.stop(ctx.currentTime + 0.4);
  },
  screech() {
    const ctx = getAudio(), buf = ctx.createBuffer(1, ctx.sampleRate * 0.5, ctx.sampleRate), d = buf.getChannelData(0);
    for (let i = 0; i < d.length; i++) d[i] = Math.random() * 2 - 1;
    const s = ctx.createBufferSource(); s.buffer = buf;
    const f = ctx.createBiquadFilter(); f.type = 'bandpass'; f.frequency.value = 3000; f.Q.value = 15;
    const g = ctx.createGain(); g.gain.setValueAtTime(0.15, ctx.currentTime); g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.5);
    s.connect(f).connect(g).connect(ctx.destination); s.start(); s.stop(ctx.currentTime + 0.5);
  },
  crash() {
    const ctx = getAudio(), buf = ctx.createBuffer(1, ctx.sampleRate * 0.6, ctx.sampleRate), d = buf.getChannelData(0);
    for (let i = 0; i < d.length; i++) d[i] = Math.random() * 2 - 1;
    const s = ctx.createBufferSource(); s.buffer = buf;
    const g = ctx.createGain(); g.gain.setValueAtTime(0.25, ctx.currentTime); g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.6);
    s.connect(g).connect(ctx.destination); s.start(); s.stop(ctx.currentTime + 0.6);
  },
  boost() {
    const ctx = getAudio(), osc = ctx.createOscillator(), g = ctx.createGain();
    osc.type = 'sawtooth'; osc.frequency.setValueAtTime(200, ctx.currentTime); osc.frequency.exponentialRampToValueAtTime(1200, ctx.currentTime + 0.5);
    g.gain.setValueAtTime(0.1, ctx.currentTime); g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.5);
    osc.connect(g).connect(ctx.destination); osc.start(); osc.stop(ctx.currentTime + 0.5);
  },
  coin() {
    const ctx = getAudio(), osc = ctx.createOscillator(), g = ctx.createGain();
    osc.type = 'sine'; osc.frequency.setValueAtTime(800, ctx.currentTime); osc.frequency.setValueAtTime(1200, ctx.currentTime + 0.08);
    g.gain.setValueAtTime(0.1, ctx.currentTime); g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + 0.2);
    osc.connect(g).connect(ctx.destination); osc.start(); osc.stop(ctx.currentTime + 0.2);
  },

      g.gain.setValueAtTime(0, ctx.currentTime + i*0.12);
      g.gain.linearRampToValueAtTime(0.08, ctx.currentTime + i*0.12 + 0.02);
      g.gain.exponentialRampToValueAtTime(0.001, ctx.currentTime + i*0.12 + 0.3);
      osc.connect(g).connect(ctx.destination); osc.start(ctx.currentTime + i*0.12); osc.stop(ctx.currentTime + i*0.12 + 0.3);
    });
  }
};

function drawCarTopDown(ctx, x, y, w, h, color = '#e63946') {
  ctx.save(); ctx.translate(x, y);
  ctx.fillStyle = color; ctx.beginPath();
  ctx.roundRect(-w/2, -h/2, w, h, [w*0.3, w*0.3, w*0.15, w*0.15]); ctx.fill();
  ctx.fillStyle = 'rgba(100,200,255,0.4)'; ctx.beginPath(); ctx.roundRect(-w*0.35, -h*0.15, w*0.7, h*0.22, 4); ctx.fill();
  ctx.fillStyle = 'rgba(100,200,255,0.3)'; ctx.beginPath(); ctx.roundRect(-w*0.28, h*0.15, w*0.56, h*0.15, 3); ctx.fill();
  ctx.fillStyle = '#222'; const ww = w*0.18, wh = h*0.18;
  ctx.fillRect(-w/2-ww*0.3,-h*0.32,ww,wh); ctx.fillRect(w/2-ww*0.7,-h*0.32,ww,wh);
  ctx.fillRect(-w/2-ww*0.3,h*0.18,ww,wh); ctx.fillRect(w/2-ww*0.7,h*0.18,ww,wh);
  ctx.fillStyle = '#ffd700'; ctx.beginPath(); ctx.arc(-w*0.28,-h/2+4,3,0,Math.PI*2); ctx.arc(w*0.28,-h/2+4,3,0,Math.PI*2); ctx.fill();
  ctx.fillStyle = '#ff3333'; ctx.beginPath(); ctx.arc(-w*0.28,h/2-4,3,0,Math.PI*2); ctx.arc(w*0.28,h/2-4,3,0,Math.PI*2); ctx.fill();
  ctx.restore();
}
function drawBikeTopDown(ctx, x, y, h, color = '#3b82f6') {
  ctx.save(); ctx.translate(x, y); const w = 14;
  ctx.fillStyle = color; ctx.beginPath(); ctx.roundRect(-w/2,-h/2,w,h,[w*0.4,w*0.4,w*0.2,w*0.2]); ctx.fill();
  ctx.fillStyle = '#222'; ctx.beginPath(); ctx.ellipse(0,-h/2+5,5,7,0,0,Math.PI*2); ctx.ellipse(0,h/2-5,5,7,0,0,Math.PI*2); ctx.fill();
  ctx.fillStyle = '#ff6b6b'; ctx.beginPath(); ctx.arc(0,-h*0.05,5,0,Math.PI*2); ctx.fill();
  ctx.restore();
}

let curLevel = null, curCh = 0, results = [];

function goMap() {
  document.getElementById('mapView').classList.add('active');
  document.getElementById('chView').classList.remove('active');
  document.getElementById('gameView').classList.remove('active');
  renderMap(); updateBar();
  if (window._gameRAF) { cancelAnimationFrame(window._gameRAF); window._gameRAF = null; }
}

function renderMap() {
  const el = document.getElementById('levelList');
  el.innerHTML = '';
  LEVELS.forEach((lv, i) => {
    const done = S.done[lv.id], locked = i > 0 && !S.done[LEVELS[i-1].id], cur = !done && !locked;
    const stars = S.stars[lv.id] || 0;
    if (i > 0) { const p = document.createElement('div'); p.className = 'pipe' + (S.done[LEVELS[i-1].id] ? ' done' : ''); el.appendChild(p); }
    const n = document.createElement('div');
    n.className = `lnode${done?' done':''}${locked?' locked':''}${cur?' cur':''}`;
    n.innerHTML = `<div class="licon">${lv.icon}</div><div class="linfo"><h3>${lv.title}</h3><p>${lv.desc}</p></div>${done?`<div class="lstars">${'⭐'.repeat(stars)}</div>`:''}`;
    if (!locked) n.onclick = () => startLevel(i);
    el.appendChild(n);
    if (done && lv.reward) {
      const rb = document.createElement('button'); rb.className = 'btn btn-s'; rb.style.cssText = 'margin-top:4px;font-size:0.75rem;';
      rb.textContent = '🎮 Play Reward'; rb.onclick = (e) => { e.stopPropagation(); showReward(lv.reward); };
      n.appendChild(rb); n.style.flexWrap = 'wrap';
    }
  });
}

function startLevel(i) {
  curLevel = i; curCh = 0; results = [];
  document.getElementById('mapView').classList.remove('active');
  document.getElementById('chView').classList.add('active');
  renderCh();
}

function renderCh() {
  const lv = LEVELS[curLevel], ch = lv.challenges[curCh];
  const el = document.getElementById('chContent');
  document.getElementById('dots').innerHTML = lv.challenges.map((_, i) =>
    `<div class="dot${i < curCh ? ' ok' : ''}${i === curCh ? ' on' : ''}"></div>`
  ).join('');

  const t = ch.type;
  if (t === 'story') renderStory(ch, el);
  else if (t === 'mcq') renderMCQ(ch, el);
  else if (t === 'fill') renderFill(ch, el);
  else if (t === 'code') renderCode(ch, el);
  else if (t === 'playground') renderPlayground(ch, el);
  else if (t === 'predict') renderPredict(ch, el);
  else if (t === 'bugfix') renderBugfix(ch, el);
  else if (t === 'livecode') renderLiveCode(ch, el);
  else if (t === 'stepthrough') renderStepthrough(ch, el);
  else if (t === 'domexplorer') renderDOMExplorer(ch, el);
  else if (t === 'reorder') renderReorder(ch, el);
}

// ── Story ──
function renderStory(ch, el) {
  el.innerHTML = `<div class="story-card"><span class="emo">${ch.emoji}</span><h2>${ch.title}</h2><p>${ch.body.replace(/\n/g,'<br>')}</p></div><button class="btn btn-p" onclick="SFX.engine(0.3);nextCh()">Let's Go! →</button>`;
}

// ── MCQ ──
let selMCQ = -1;
function renderMCQ(ch, el) {
  selMCQ = -1;
  el.innerHTML = `<div class="ch-card"><h3>Choose the correct answer</h3><p style="font-family:'JetBrains Mono',monospace;white-space:pre-wrap;">${ch.question.replace(/\n/g,'<br>')}</p><div class="mcq-opts" id="opts">${ch.options.map((o,i) => `<div class="mcq-opt" onclick="pickMCQ(${i})">${o}</div>`).join('')}</div><button class="btn btn-p" id="mcqBtn" disabled onclick="checkMCQ()">Check</button><div class="fb" id="fb"></div></div>`;
}
function pickMCQ(i) { selMCQ = i; document.querySelectorAll('.mcq-opt').forEach((o,j) => o.classList.toggle('sel', j===i)); document.getElementById('mcqBtn').disabled = false; }
function checkMCQ() {
  const ch = LEVELS[curLevel].challenges[curCh], opts = document.querySelectorAll('.mcq-opt'), fb = document.getElementById('fb');
  opts.forEach((o,i) => { o.onclick=null; if (i===ch.correct) o.classList.add('ok'); if (i===selMCQ&&i!==ch.correct) o.classList.add('bad'); });
  if (selMCQ===ch.correct) { SFX.coin(); fb.className='fb show win'; fb.innerHTML='✓ Correct!'; results.push(true); }
  else { fb.className='fb show lose'; fb.innerHTML=`✗ Not quite. <div class="hint">${ch.hint}</div>`; results.push(false); }
  const btn=document.getElementById('mcqBtn'); btn.textContent='Next →'; btn.disabled=false; btn.onclick=nextCh;
}

// ── Fill ──
function renderFill(ch, el) {
  el.innerHTML = `<div class="ch-card"><h3>Fill in the blank</h3><p>${ch.question}</p><div style="font-family:'JetBrains Mono',monospace;font-size:0.85rem;background:var(--code-bg);padding:14px;border-radius:8px;line-height:2;">${ch.codeBefore}<input type="text" class="fill-inp" id="fillI" autocomplete="off" spellcheck="false">${ch.codeAfter}</div><div class="btn-row" style="margin-top:14px;"><button class="btn btn-p" onclick="checkFill()">Check</button></div><div class="fb" id="fb"></div></div>`;
  document.getElementById('fillI').addEventListener('keydown', e => { if (e.key==='Enter') checkFill(); });
}
function checkFill() {
  const ch=LEVELS[curLevel].challenges[curCh], inp=document.getElementById('fillI'), fb=document.getElementById('fb');
  if (ch.accept.includes(inp.value.trim())) { SFX.coin(); inp.classList.add('ok'); fb.className='fb show win'; fb.innerHTML='✓ Perfect!'; results.push(true); setTimeout(nextCh,700); }
  else { inp.classList.add('bad'); setTimeout(()=>inp.classList.remove('bad'),350); fb.className='fb show lose'; fb.innerHTML=`✗ Try again. <div class="hint">${ch.hint}</div>`; results.push(false); }
}

// ── Code ──
function renderCode(ch, el) {
  el.innerHTML = `<div class="ch-card"><h3>Write Code</h3><p>${ch.question.replace(/\n/g,'<br>')}</p><textarea class="code-editor" id="codeI" spellcheck="false">${ch.starter}</textarea><div class="console" id="out">Output will appear here...</div><div class="btn-row"><button class="btn btn-p" onclick="runCode()">▶ Run & Check</button><button class="btn btn-s" onclick="showHint()">💡 Hint</button></div><div class="fb" id="fb"></div></div>`;
  document.getElementById('codeI').addEventListener('keydown', e => { if (e.key==='Tab') { e.preventDefault(); const t=e.target,s=t.selectionStart; t.value=t.value.substring(0,s)+'  '+t.value.substring(t.selectionEnd); t.selectionStart=t.selectionEnd=s+2; } });
}
function runCode() {
  const ch=LEVELS[curLevel].challenges[curCh], code=document.getElementById('codeI').value, out=document.getElementById('out'), fb=document.getElementById('fb'), ed=document.getElementById('codeI');
  let result, logs=[];
  const origLog=console.log;
  console.log=(...a) => logs.push(a.map(x=>typeof x==='object'?JSON.stringify(x):String(x)).join(' '));
  try { result=ch.validate(code); } catch(e) { result={pass:false,msg:e.message}; }
  console.log=origLog;
  out.innerHTML=logs.length?logs.map(l=>`<div style="color:var(--text-dim)">&gt; ${l}</div>`).join(''):'<span style="color:var(--text-dim)">No output</span>';
  if (result.pass) { SFX.coin(); ed.classList.add('ok'); fb.className='fb show win'; fb.innerHTML='✓ All tests passed!'; results.push(true); setTimeout(nextCh,1000); }
  else { ed.classList.add('bad'); setTimeout(()=>ed.classList.remove('bad'),350); fb.className='fb show lose'; fb.innerHTML=`✗ ${result.msg}`; results.push(false); }
}
function showHint() {
  const ch=LEVELS[curLevel].challenges[curCh], fb=document.getElementById('fb');
  fb.className='fb show'; fb.style.cssText='background:rgba(245,158,11,0.1);border:1px solid var(--orange);color:var(--orange);display:block;';
  fb.innerHTML=`💡 ${ch.hint}`;
}

// ── PLAYGROUND: Live split editor + preview ──
function renderPlayground(ch, el) {
  el.innerHTML = `
    <div class="ch-card">
      <h3>${ch.title}</h3>
      <p>${ch.description}</p>
      <div class="playground">
        <div class="pg-editor"><span class="pg-editor-label">HTML</span><textarea id="pgHTML" spellcheck="false">${ch.startHTML}</textarea></div>
        <div class="pg-preview" id="pgPreview"><span class="pg-preview-label">Preview</span></div>
      </div>
      <div style="margin-bottom:8px;">
        <span style="font-size:0.72rem;text-transform:uppercase;letter-spacing:1px;color:var(--orange);font-weight:700;">JavaScript</span>
      </div>
      <textarea class="code-editor" id="pgJS" spellcheck="false" style="min-height:180px;">${ch.startJS}</textarea>
      <div class="btn-row" style="margin-top:10px;">
        <button class="btn btn-p" onclick="runPlayground()">▶ Run</button>
        <button class="btn btn-s" onclick="nextCh()">Continue →</button>
      </div>
      <p style="font-size:0.8rem;color:var(--green-glow);margin-top:10px;font-style:italic;">${ch.goal}</p>
    </div>
  `;
  // Tab support
  ['pgHTML','pgJS'].forEach(id => {
    document.getElementById(id).addEventListener('keydown', e => {
      if (e.key==='Tab') { e.preventDefault(); const t=e.target,s=t.selectionStart; t.value=t.value.substring(0,s)+'  '+t.value.substring(t.selectionEnd); t.selectionStart=t.selectionEnd=s+2; }
    });
  });
  // Auto-run on load
  setTimeout(runPlayground, 100);
}
function runPlayground() {
  const html = document.getElementById('pgHTML').value;
  const js = document.getElementById('pgJS').value;
  const preview = document.getElementById('pgPreview');
  // Use iframe for isolation
  let iframe = preview.querySelector('iframe');
  if (iframe) iframe.remove();
  iframe = document.createElement('iframe');
  iframe.style.cssText = 'width:100%;height:100%;min-height:180px;border:none;background:white;';
  preview.appendChild(iframe);
  const doc = iframe.contentDocument;
  doc.open();
  doc.write(`<html><body style="margin:10px;font-family:sans-serif;">${html}<script>${js}<\/script></body></html>`);
  doc.close();
  SFX.engine(0.2, 0.1);
}

// ── PREDICT: Show code, guess output ──
function renderPredict(ch, el) {
  el.innerHTML = `
    <div class="ch-card">
      <h3>${ch.title}</h3>
      <div class="predict-code">${ch.code}</div>
      <p style="font-weight:700;margin-bottom:8px;">${ch.question}</p>

      <div class="btn-row" style="margin-top:12px;">
        <button class="btn btn-p" id="predBtn" onclick="checkPredict()">Check My Prediction</button>
      </div>
      <div class="predict-reveal" id="predReveal"></div>
      <div class="fb" id="fb"></div>
    </div>
  `;
  document.getElementById('predI').addEventListener('keydown', e => { if (e.key==='Enter') checkPredict(); });
  document.getElementById('predI').focus();
}
function checkPredict() {
  const ch=LEVELS[curLevel].challenges[curCh];
  const inp=document.getElementById('predI');
  const val=inp.value.trim();
  const fb=document.getElementById('fb');
  const reveal=document.getElementById('predReveal');
  const allAnswers = [ch.answer, ...(ch.acceptAlso||[])].map(a=>a.trim().toLowerCase());

  if (allAnswers.includes(val.toLowerCase())) {
    SFX.coin(); inp.classList.add('ok');
    fb.className='fb show win'; fb.innerHTML='✓ You predicted correctly! Great mental model!';
    results.push(true);
  } else {
    inp.classList.add('bad');
    fb.className='fb show lose'; fb.innerHTML=`✗ Not quite — the answer is <strong>${ch.answer}</strong>`;
    results.push(false);
  }
  reveal.className='predict-reveal show';
  reveal.innerHTML=`<strong>Why:</strong> ${ch.explanation}`;
  document.getElementById('predBtn').textContent='Next →';
  document.getElementById('predBtn').onclick=nextCh;

// ── STEPTHROUGH: Line-by-line code execution ──
function renderStepthrough(ch, el) {
  let step = -1;
  el.innerHTML = `
    <div class="ch-card">
      <h3>${ch.title}</h3>
      <p>${ch.description}</p>
      <div class="step-container" id="stepLines">
        ${ch.lines.map((l, i) => `<div class="step-line" id="sl${i}"><code>${l.code}</code></div>`).join('')}
      </div>
      <div class="var-watch" id="varWatch"></div>
      <div id="stepExplain" style="background:var(--surface2);border-radius:8px;padding:12px 16px;margin-bottom:12px;color:var(--text-dim);font-size:0.85rem;min-height:40px;">Click "Step" to start executing line by line...</div>
      <div class="step-controls">
        <button class="step-btn primary" id="stepBtn" onclick="doStep()">▶ Step</button>
        <button class="step-btn" onclick="resetStep()">↺ Reset</button>
        <span style="color:var(--text-dim);font-size:0.8rem;" id="stepCount"></span>
      </div>
      <div class="btn-row" style="margin-top:14px;">
        <button class="btn btn-s" onclick="nextCh()">Continue →</button>
      </div>
    </div>
  `;

  window._stepData = { ch, step: -1 };
}
function doStep() {
  const d = window._stepData;
  d.step++;
  if (d.step >= d.ch.lines.length) { d.step = d.ch.lines.length - 1; return; }

  const l = d.ch.lines[d.step];

  // Highlight current line
  d.ch.lines.forEach((_, i) => {
    const sl = document.getElementById('sl' + i);
    sl.className = 'step-line' + (i < d.step ? ' done' : '') + (i === d.step ? ' active' : '');
  });

  // Update explanation
  document.getElementById('stepExplain').innerHTML = `<strong>Line ${d.step + 1}:</strong> ${l.explain}`;

  // Update variable watcher
  if (l.vars) {
    document.getElementById('varWatch').innerHTML = Object.entries(l.vars).map(([k, v]) => {
      const prev = d.step > 0 && d.ch.lines[d.step - 1].vars ? d.ch.lines[d.step - 1].vars[k] : undefined;
      const changed = prev !== undefined && prev !== v;
      return `<div class="var-box${changed ? ' changed' : ''}"><div class="var-name">${k}</div><div class="var-val">${v}</div></div>`;
    }).join('');
  }

  document.getElementById('stepCount').textContent = `Step ${d.step + 1} / ${d.ch.lines.length}`;

  SFX.engine(0.15, 0.08);

  if (d.step >= d.ch.lines.length - 1) {
    document.getElementById('stepBtn').textContent = '✓ Done';
    document.getElementById('stepBtn').disabled = true;
  }
}
function resetStep() {
  window._stepData.step = -1;
  const ch = window._stepData.ch;
  ch.lines.forEach((_, i) => { document.getElementById('sl'+i).className='step-line'; });
  document.getElementById('varWatch').innerHTML = '';
  document.getElementById('stepExplain').innerHTML = 'Click "Step" to start executing line by line...';
  document.getElementById('stepBtn').textContent = '▶ Step';
  document.getElementById('stepBtn').disabled = false;
  document.getElementById('stepCount').textContent = '';
}

// ── DOM EXPLORER: Interactive tree ──
function renderDOMExplorer(ch, el) {
  el.innerHTML = `
    <div class="ch-card">
      <h3>${ch.title}</h3>
      <p>${ch.description}</p>
      <div style="display:grid;grid-template-columns:1fr 1fr;gap:12px;">
        <div>
          <div style="font-size:0.72rem;text-transform:uppercase;letter-spacing:1px;color:var(--orange);font-weight:700;margin-bottom:8px;">DOM Tree (click an element)</div>
          <div class="dom-viz" id="domTree"></div>
        </div>
        <div>
          <div style="font-size:0.72rem;text-transform:uppercase;letter-spacing:1px;color:var(--green-glow);font-weight:700;margin-bottom:8px;">Live Preview</div>
          <div id="domPreview" style="background:white;border-radius:10px;padding:12px;min-height:120px;"></div>
        </div>
      </div>
      <div style="margin-top:12px;">
        <div style="font-size:0.72rem;text-transform:uppercase;letter-spacing:1px;color:var(--accent-glow);font-weight:700;margin-bottom:8px;">Modify Selected Element</div>
        <div style="display:flex;gap:8px;flex-wrap:wrap;">
          <input id="domText" placeholder="New text..." style="flex:1;min-width:120px;padding:6px 10px;background:var(--code-bg);border:1px solid var(--border);border-radius:6px;color:var(--text);font-size:0.85rem;outline:none;">
          <input id="domColor" type="color" value="#e63946" style="width:40px;height:32px;border:none;cursor:pointer;">
          <button class="btn btn-p" onclick="applyDOMChange()" style="padding:6px 14px;font-size:0.8rem;">Apply</button>
          <button class="btn btn-s" onclick="nextCh()" style="padding:6px 14px;font-size:0.8rem;">Continue →</button>
        </div>
      </div>
    </div>
  `;

  // Build DOM tree view
  const parser = new DOMParser();
  const doc = parser.parseFromString(ch.html, 'text/html');
  const root = doc.body.firstElementChild;

  function buildTree(node, depth = 0) {
    let html = '';
    const tag = node.tagName.toLowerCase();
    const id = node.id ? ` <span class="dom-attr">id="${node.id}"</span>` : '';
    const text = node.childNodes.length === 1 && node.childNodes[0].nodeType === 3 ? node.textContent.trim() : '';

    html += `<div class="dom-node" data-selector="${node.id ? '#'+node.id : tag}" onclick="selectDOMNode(this)" style="margin-left:${depth*20}px;cursor:pointer;">`;
    html += `<span class="dom-tag">&lt;${tag}${id}&gt;</span>`;
    if (text) html += ` <span class="dom-text">"${text}"</span>`;
    html += `</div>`;

    for (const child of node.children) {
      html += buildTree(child, depth + 1);
    }
    return html;
  }

  document.getElementById('domTree').innerHTML = `<div class="dom-tree">${buildTree(root)}</div>`;

  // Live preview
  const preview = document.getElementById('domPreview');
  const iframe = document.createElement('iframe');
  iframe.style.cssText = 'width:100%;height:120px;border:none;';
  preview.appendChild(iframe);
  iframe.contentDocument.open();
  iframe.contentDocument.write(`<html><body style="margin:10px;font-family:sans-serif;">${ch.html}</body></html>`);
  iframe.contentDocument.close();

  window._domExplorer = { iframe, selected: null };
}
function selectDOMNode(nodeEl) {
  document.querySelectorAll('.dom-node').forEach(n => n.classList.remove('highlight'));
  nodeEl.classList.add('highlight');
  window._domExplorer.selected = nodeEl.dataset.selector;
  SFX.coin();
}
function applyDOMChange() {
  const d = window._domExplorer;
  if (!d.selected) return;
  const doc = d.iframe.contentDocument;
  const el = doc.querySelector(d.selected);
  if (!el) return;
  const text = document.getElementById('domText').value;
  const color = document.getElementById('domColor').value;
  if (text) el.textContent = text;
  el.style.color = color;
  SFX.engine(0.3, 0.15);

  // Update tree text
  document.querySelectorAll('.dom-node.highlight .dom-text').forEach(t => {
    if (text) t.textContent = `"${text}"`;
  });
}

// ── REORDER: Drag to reorder code ──
function renderReorder(ch, el) {
  const shuffled = ch.lines.map((l,i)=>({line:l,orig:i}));
  for (let i=shuffled.length-1;i>0;i--) { const j=Math.floor(Math.random()*(i+1)); [shuffled[i],shuffled[j]]=[shuffled[j],shuffled[i]]; }

  el.innerHTML = `
    <div class="ch-card">
      <h3>Reorder the Code</h3>
      <p>${ch.question}</p>
      <div class="reorder-container" id="reorderBox">
        ${shuffled.map((item, i) => `<div class="reorder-item" draggable="true" data-orig="${item.orig}"><span class="reorder-num">${i+1}.</span>${item.line}</div>`).join('')}
      </div>
      <div class="btn-row"><button class="btn btn-p" onclick="checkReorder()">Check Order</button></div>
      <div class="fb" id="fb"></div>
    </div>
  `;

  const container = document.getElementById('reorderBox');
  let dragged = null;
  container.querySelectorAll('.reorder-item').forEach(item => {
    item.addEventListener('dragstart', () => { dragged=item; item.classList.add('dragging'); });
    item.addEventListener('dragend', () => { item.classList.remove('dragging'); container.querySelectorAll('.reorder-item').forEach(i=>i.classList.remove('over')); });
    item.addEventListener('dragover', e => { e.preventDefault(); item.classList.add('over'); });
    item.addEventListener('dragleave', () => item.classList.remove('over'));
    item.addEventListener('drop', e => {
      e.preventDefault(); item.classList.remove('over');
      if (dragged !== item) {
        const all=[...container.querySelectorAll('.reorder-item')];
        if (all.indexOf(dragged)<all.indexOf(item)) container.insertBefore(dragged,item.nextSibling);
        else container.insertBefore(dragged,item);
        container.querySelectorAll('.reorder-item').forEach((el,i) => { el.querySelector('.reorder-num').textContent=`${i+1}.`; });
      }
    });
  });
}
function checkReorder() {
  const ch=LEVELS[curLevel].challenges[curCh];
  const items=[...document.querySelectorAll('.reorder-item')].map(el=>parseInt(el.dataset.orig));
  const fb=document.getElementById('fb');
  if (JSON.stringify(items)===JSON.stringify(ch.correctOrder)) {
    SFX.coin(); fb.className='fb show win'; fb.innerHTML='✓ Perfect order!'; results.push(true); setTimeout(nextCh,1000);
  } else {
    fb.className='fb show lose'; fb.innerHTML=`✗ Not quite right. <div class="hint">${ch.hint}</div>`; results.push(false);
  }
}

function nextCh() {
  curCh++;
  if (curCh >= LEVELS[curLevel].challenges.length) { completeLevel(); return; }
  renderCh();
}

function completeLevel() {
  const lv=LEVELS[curLevel], correct=results.filter(Boolean).length, total=results.length||1, ratio=correct/total;
  let stars=ratio>=0.9?3:ratio>=0.6?2:1;
  S.done[lv.id]=true; if (stars>(S.stars[lv.id]||0)) S.stars[lv.id]=stars;
  addXP(lv.xp); save(); SFX.levelUp(); spawnParts();
  const rewardNames = { dashboard:'🏎️ Car Dashboard!', controls:'🎮 Controllable Car!', racer:'💨 Dodge Racer!', tuner:'🔧 Car Tuner!', garage:'🏪 Garage Manager!', fullgame:'🏁 FULL RACING GAME!' };
  document.getElementById('celE').textContent=['🎉','🚀','🏆'][stars-1];
  document.getElementById('celT').textContent='Level Complete!';
  document.getElementById('celD').textContent=`${correct}/${total} challenges correct — ${stars} star${stars>1?'s':''}!`;
  document.getElementById('celXP').textContent=`+${lv.xp} XP`;
  document.getElementById('celR').textContent=rewardNames[lv.reward]||'';
  document.getElementById('cel').classList.add('show');
  const celBtn=document.getElementById('celBtn');
  if (lv.reward) { celBtn.textContent='🎮 Play Reward!'; celBtn.onclick=()=>{ document.getElementById('cel').classList.remove('show'); showReward(lv.reward); }; }
  else { celBtn.textContent='Continue'; celBtn.onclick=()=>{ document.getElementById('cel').classList.remove('show'); goMap(); }; }
}

function spawnParts() {
  const em=['🏎️','🏍️','💨','⭐','🔥','🏁','🏆'];
  for (let i=0;i<18;i++) { const p=document.createElement('div'); p.className='particle'; p.textContent=em[Math.floor(Math.random()*em.length)]; p.style.left=Math.random()*window.innerWidth+'px'; p.style.top=Math.random()*window.innerHeight*0.3+'px'; p.style.fontSize=(14+Math.random()*18)+'px'; p.style.animationDelay=Math.random()*0.5+'s'; document.body.appendChild(p); setTimeout(()=>p.remove(),2000); }

    if(alive){if(keys['ArrowLeft'])carX=Math.max(75,carX-5);if(keys['ArrowRight'])carX=Math.min(325,carX+5);if(keys['ArrowUp'])speed=Math.min(10,speed+0.1);speed+=0.001;roadOff=(roadOff+speed*2)%40;
    if(frame%Math.max(20,50-Math.floor(speed*3))===0)obstacles.push({x:70+Math.random()*240,y:-40,w:36,h:56,color:['#3b82f6','#8b5cf6','#06b6d4'][Math.floor(Math.random()*3)]});
    if(frame%45===0)coins.push({x:80+Math.random()*230,y:-20});
    obstacles.forEach(o=>o.y+=speed*1.5);obstacles=obstacles.filter(o=>o.y<600);coins.forEach(c=>c.y+=speed*1.2);coins=coins.filter(c=>c.y<600);
    const cr={x:carX-18,y:430,width:36,height:56};for(const o of obstacles){const or={x:o.x-o.w/2,y:o.y-o.h/2,width:o.w,height:o.h};if(cr.x<or.x+or.width&&cr.x+cr.width>or.x&&cr.y<or.y+or.height&&cr.y+cr.height>or.y){alive=false;SFX.crash();const best=parseInt(localStorage.getItem('jsq_best')||0);if(score>best)localStorage.setItem('jsq_best',score);document.getElementById('rBest').textContent=Math.max(score,best);break;}}
    coins=coins.filter(c=>{if(Math.abs(c.x-carX)<25&&Math.abs(c.y-450)<30){score+=10;SFX.coin();return false;}return true;});
    score+=Math.floor(speed*0.1);document.getElementById('rScore').textContent=score;if(frame%6===0&&speed>2)SFX.engine(speed/10,0.04);}
    ctx.fillStyle='#2d2d3d';ctx.fillRect(60,0,280,550);ctx.strokeStyle='#f59e0b';ctx.lineWidth=2;ctx.setLineDash([20,15]);ctx.lineDashOffset=-roadOff;
    [140,200,260].forEach(lx=>{ctx.beginPath();ctx.moveTo(lx,0);ctx.lineTo(lx,550);ctx.stroke();});ctx.setLineDash([]);
    ctx.strokeStyle='#fff';ctx.lineWidth=3;ctx.beginPath();ctx.moveTo(60,0);ctx.lineTo(60,550);ctx.stroke();ctx.beginPath();ctx.moveTo(340,0);ctx.lineTo(340,550);ctx.stroke();
    obstacles.forEach(o=>drawCarTopDown(ctx,o.x,o.y,o.w,o.h,o.color));
    coins.forEach(c=>{ctx.fillStyle='#fbbf24';ctx.beginPath();ctx.arc(c.x,c.y,8,0,Math.PI*2);ctx.fill();ctx.fillStyle='#92400e';ctx.font='bold 10px sans-serif';ctx.textAlign='center';ctx.fillText('$',c.x,c.y+3.5);});
    drawCarTopDown(ctx,carX,450,36,56,'#e63946');ctx.fillStyle='#fff';ctx.font='bold 13px Orbitron,monospace';ctx.textAlign='left';ctx.fillText(`${Math.round(speed*30)} km/h`,8,22);
    if(!alive&&frame>10){ctx.fillStyle='rgba(0,0,0,0.6)';ctx.fillRect(0,200,400,150);ctx.fillStyle='#e63946';ctx.font='bold 28px Orbitron,monospace';ctx.textAlign='center';ctx.fillText('CRASHED!',200,260);ctx.fillStyle='#fff';ctx.font='16px Inter,sans-serif';ctx.fillText(`Score: ${score}`,200,295);ctx.fillStyle='#94a3b8';ctx.font='13px Inter,sans-serif';ctx.fillText('Press START to retry',200,325);}
    window._gameRAF=requestAnimationFrame(loop);}
  const origGoMap=window.goMap;window.goMap=()=>{document.removeEventListener('keydown',kd);document.removeEventListener('keyup',ku);origGoMap();window.goMap=origGoMap;};loop();
}

function buildTuner(el) {
  el.innerHTML = `<div class="story-card"><h2>🔧 Car Tuner</h2><p>Use closures in action! Each slider uses closure to remember its setting.</p></div><div class="game-container"><div class="game-titlebar"><h3>TUNE YOUR RIDE</h3><div class="game-stats" id="tunerStats">Power: <span>100</span> HP</div></div><canvas id="gameCanvas" width="400" height="300"></canvas><div style="padding:16px;display:flex;flex-direction:column;gap:12px;"><label style="color:var(--text-dim);font-size:0.85rem;">Engine Power: <input type="range" id="tPower" min="50" max="500" value="150" style="width:200px;"> <span id="tPowerVal">150</span> HP</label><label style="color:var(--text-dim);font-size:0.85rem;">Car Color: <input type="color" id="tColor" value="#e63946"></label><label style="color:var(--text-dim);font-size:0.85rem;">Turbo: <input type="checkbox" id="tTurbo"> <span id="tTurboLabel">Off</span></label><button class="btn btn-p" id="tRevBtn" style="width:fit-content;">🔊 Rev Engine!</button></div></div>`;
  const canvas=document.getElementById('gameCanvas'),ctx=canvas.getContext('2d');let shake=0,color='#e63946',turbo=false,power=150;
  function draw(){ctx.clearRect(0,0,400,300);ctx.fillStyle='#0a0a14';ctx.fillRect(0,0,400,300);const sx=(Math.random()-0.5)*shake,sy=(Math.random()-0.5)*shake;ctx.save();ctx.translate(200+sx,180+sy);
  ctx.fillStyle=color;ctx.beginPath();ctx.moveTo(-80,0);ctx.lineTo(-60,-40);ctx.lineTo(30,-40);ctx.lineTo(70,-10);ctx.lineTo(80,0);ctx.lineTo(80,20);ctx.lineTo(-80,20);ctx.closePath();ctx.fill();
  ctx.fillStyle='rgba(100,200,255,0.3)';ctx.beginPath();ctx.moveTo(-55,-38);ctx.lineTo(-20,-38);ctx.lineTo(-20,-5);ctx.lineTo(-55,-5);ctx.closePath();ctx.fill();ctx.beginPath();ctx.moveTo(-15,-38);ctx.lineTo(25,-38);ctx.lineTo(55,-10);ctx.lineTo(-15,-5);ctx.closePath();ctx.fill();
  ctx.fillStyle='#333';ctx.beginPath();ctx.arc(-45,25,18,0,Math.PI*2);ctx.fill();ctx.beginPath();ctx.arc(50,25,18,0,Math.PI*2);ctx.fill();ctx.fillStyle='#666';ctx.beginPath();ctx.arc(-45,25,10,0,Math.PI*2);ctx.fill();ctx.beginPath();ctx.arc(50,25,10,0,Math.PI*2);ctx.fill();
  if(turbo&&shake>0.5){ctx.fillStyle=`hsl(${30+Math.random()*20},100%,${50+Math.random()*30}%)`;const fl=15+Math.random()*power*0.1;ctx.beginPath();ctx.moveTo(-80,5);ctx.lineTo(-80-fl,10);ctx.lineTo(-80,15);ctx.closePath();ctx.fill();}
  ctx.fillStyle='rgba(255,215,0,0.6)';ctx.beginPath();ctx.arc(78,-3,5,0,Math.PI*2);ctx.fill();ctx.restore();
  ctx.fillStyle='#fff';ctx.font='bold 14px Orbitron,monospace';ctx.textAlign='center';ctx.fillText(`${power} HP ${turbo?'+ TURBO 🔥':''}`,200,30);shake*=0.95;window._gameRAF=requestAnimationFrame(draw);}
  document.getElementById('tPower').oninput=e=>{power=parseInt(e.target.value);document.getElementById('tPowerVal').textContent=power;};
  document.getElementById('tColor').oninput=e=>{color=e.target.value;};
  document.getElementById('tTurbo').onchange=e=>{turbo=e.target.checked;document.getElementById('tTurboLabel').textContent=turbo?'ON 🔥':'Off';};
  document.getElementById('tRevBtn').onclick=()=>{shake=power*0.03;SFX.engine(power/500,0.3);if(turbo)setTimeout(()=>SFX.boost(),200);};
  draw();
}

function buildGarage(el) {
  let garage=[{name:'Street Racer',hp:150,color:'#e63946',turbo:false},{name:'Night Runner',hp:280,color:'#3b82f6',turbo:false},{name:'Thunder Bolt',hp:420,color:'#f59e0b',turbo:true}];let selected=0;
  function render(){el.innerHTML=`<div class="story-card"><h2>🏪 Your Garage</h2><p>Manage your collection! Destructuring & spread in action.</p></div><div style="display:flex;gap:12px;flex-wrap:wrap;margin-bottom:20px;">${garage.map((c,i)=>`<div onclick="window._selectCar(${i})" style="flex:1;min-width:140px;padding:14px;background:var(--surface);border:2px solid ${i===selected?'var(--accent)':'var(--border)'};border-radius:12px;cursor:pointer;text-align:center;"><div style="font-size:2rem;margin-bottom:6px;">🏎️</div><div style="font-weight:700;font-size:0.9rem;">${c.name}</div><div style="color:var(--text-dim);font-size:0.8rem;">${c.hp} HP ${c.turbo?'🔥':''}</div><div style="width:24px;height:24px;border-radius:50%;background:${c.color};margin:8px auto 0;border:2px solid var(--border);"></div></div>`).join('')}<div onclick="window._addCar()" style="flex:1;min-width:140px;padding:14px;background:var(--surface2);border:2px dashed var(--border);border-radius:12px;cursor:pointer;text-align:center;display:flex;align-items:center;justify-content:center;font-size:2rem;color:var(--text-dim);">+</div></div><div class="ch-card"><h3>Selected: ${garage[selected].name}</h3><div style="display:flex;gap:10px;flex-wrap:wrap;"><button class="btn btn-p" onclick="window._upgradeCar()">⬆ Upgrade (+50 HP)</button><button class="btn btn-s" onclick="window._toggleTurbo()">🔥 Toggle Turbo</button><button class="btn btn-s" onclick="window._paintCar()">🎨 Random Paint</button>${garage.length>1?`<button class="btn btn-s" onclick="window._removeCar()" style="color:#ef4444;">🗑️ Sell</button>`:''}</div></div>`;}
  window._selectCar=i=>{selected=i;render();SFX.coin();};
  window._addCar=()=>{const names=['Viper','Phantom','Blaze','Shadow','Rocket','Storm'];garage=[...garage,{name:names[Math.floor(Math.random()*names.length)]+' '+(garage.length+1),hp:100+Math.floor(Math.random()*200),color:'#'+Math.floor(Math.random()*16777215).toString(16).padStart(6,'0'),turbo:false}];selected=garage.length-1;SFX.coin();render();};
  window._upgradeCar=()=>{garage=garage.map((c,i)=>i===selected?{...c,hp:c.hp+50}:c);SFX.boost();render();};
  window._toggleTurbo=()=>{garage=garage.map((c,i)=>i===selected?{...c,turbo:!c.turbo}:c);SFX.engine(0.7);render();};
  window._paintCar=()=>{garage=garage.map((c,i)=>i===selected?{...c,color:'#'+Math.floor(Math.random()*16777215).toString(16).padStart(6,'0')}:c);render();};
  window._removeCar=()=>{garage=garage.filter((_,i)=>i!==selected);selected=Math.min(selected,garage.length-1);SFX.screech();render();};
  render();
}

function buildFullGame(el) {
  el.innerHTML=`<div class="game-container"><div class="game-titlebar"><h3>SPEED RACER — THE GAME</h3><div class="game-stats">Score: <span id="fScore">0</span> Combo: <span id="fCombo">x1</span> Best: <span id="fBest">${localStorage.getItem('jsq_fullbest')||0}</span></div></div><canvas id="gameCanvas" width="400" height="550"></canvas><div class="game-controls-info"><span><kbd>←</kbd><kbd>→</kbd> Steer <kbd>↑</kbd> Boost <kbd>Space</kbd> Honk <kbd>B</kbd> Bike</span><button class="btn-sm" id="fStart">🏁 RACE!</button></div></div>`;
  const canvas=document.getElementById('gameCanvas'),ctx=canvas.getContext('2d'),W=400,H=550;
  let state={alive:false,score:0,combo:0,multiplier:1,speed:3,carX:200,isBike:false,obstacles:[],coins:[],boostFuel:100,boosting:false,roadOff:0,frame:0,shake:0};
  const keys={};
  const kd=e=>{keys[e.key]=true;if(['ArrowUp','ArrowDown','ArrowLeft','ArrowRight',' '].includes(e.key))e.preventDefault();if(e.key===' ')SFX.honk();if(e.key==='b'||e.key==='B')state.isBike=!state.isBike;};
  const ku=e=>{keys[e.key]=false;};document.addEventListener('keydown',kd);document.addEventListener('keyup',ku);
  document.getElementById('fStart').onclick=()=>{state={...state,alive:true,score:0,combo:0,multiplier:1,speed:3.5,carX:200,obstacles:[],coins:[],boostFuel:100,boosting:false,frame:0,shake:0};document.getElementById('fStart').textContent='🔄 RESTART';SFX.engine(0.6);};
  function loop(){state.frame++;const s=state;
    if(s.alive){const ss=s.isBike?6:5;if(keys['ArrowLeft'])s.carX=Math.max(75,s.carX-ss);if(keys['ArrowRight'])s.carX=Math.min(325,s.carX+ss);if(keys['ArrowUp']&&s.boostFuel>0){s.boosting=true;s.boostFuel=Math.max(0,s.boostFuel-1);s.speed=Math.min(12,s.speed+0.2);}else{s.boosting=false;}
    s.speed+=0.0008;s.roadOff=(s.roadOff+s.speed*2)%40;if(!s.boosting)s.boostFuel=Math.min(100,s.boostFuel+0.15);
    if(s.frame%Math.max(15,45-Math.floor(s.speed*2))===0){const lane=85+Math.floor(Math.random()*4)*65;s.obstacles.push({x:lane,y:-50,w:34,h:52,color:['#3b82f6','#8b5cf6','#06b6d4','#10b981'][Math.floor(Math.random()*4)]});}
    if(s.frame%35===0)s.coins.push({x:80+Math.random()*230,y:-20});
    s.obstacles.forEach(o=>o.y+=s.speed*1.6);s.obstacles=s.obstacles.filter(o=>{if(o.y>H+50){s.combo++;if(s.combo>=10)s.multiplier=3;else if(s.combo>=5)s.multiplier=2;return false;}return true;});
    s.coins.forEach(c=>c.y+=s.speed*1.3);s.coins=s.coins.filter(c=>c.y<H+30);
    const pw=s.isBike?14:34,ph=s.isBike?44:52,pr={x:s.carX-pw/2,y:440-ph/2,width:pw,height:ph};
    for(const o of s.obstacles){const or={x:o.x-o.w/2,y:o.y-o.h/2,width:o.w,height:o.h};if(pr.x<or.x+or.width&&pr.x+pr.width>or.x&&pr.y<or.y+or.height&&pr.y+pr.height>or.y){s.alive=false;s.shake=10;SFX.crash();const best=parseInt(localStorage.getItem('jsq_fullbest')||0);if(s.score>best)localStorage.setItem('jsq_fullbest',s.score);document.getElementById('fBest').textContent=Math.max(s.score,best);break;}}
    s.coins=s.coins.filter(c=>{if(Math.abs(c.x-s.carX)<22&&Math.abs(c.y-440)<28){s.score+=10*s.multiplier;s.combo++;if(s.combo>=10)s.multiplier=3;else if(s.combo>=5)s.multiplier=2;SFX.coin();return false;}return true;});
    s.score+=Math.floor(s.speed*0.1*s.multiplier);document.getElementById('fScore').textContent=s.score;document.getElementById('fCombo').textContent=`x${s.multiplier}`;
    if(s.frame%8===0&&s.speed>2)SFX.engine(s.speed/12,0.03);if(s.boosting&&s.frame%15===0)SFX.boost();}
    const sx=(Math.random()-0.5)*s.shake,sy=(Math.random()-0.5)*s.shake;s.shake*=0.9;ctx.save();ctx.translate(sx,sy);ctx.fillStyle='#0a0a14';ctx.fillRect(0,0,W,H);
    ctx.fillStyle='#2d2d3d';ctx.fillRect(55,0,290,H);ctx.fillStyle='#1a2e1a';ctx.fillRect(0,0,55,H);ctx.fillRect(345,0,55,H);
    ctx.strokeStyle='#f59e0b44';ctx.lineWidth=2;ctx.setLineDash([20,15]);ctx.lineDashOffset=-s.roadOff;[125,200,275].forEach(x=>{ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,H);ctx.stroke();});ctx.setLineDash([]);
    ctx.strokeStyle='#ffffff88';ctx.lineWidth=3;ctx.beginPath();ctx.moveTo(55,0);ctx.lineTo(55,H);ctx.stroke();ctx.beginPath();ctx.moveTo(345,0);ctx.lineTo(345,H);ctx.stroke();
    s.obstacles.forEach(o=>drawCarTopDown(ctx,o.x,o.y,o.w,o.h,o.color));
    s.coins.forEach(c=>{ctx.fillStyle='#fbbf24';ctx.beginPath();ctx.arc(c.x,c.y,9,0,Math.PI*2);ctx.fill();ctx.fillStyle='#92400e';ctx.font='bold 11px sans-serif';ctx.textAlign='center';ctx.fillText('$',c.x,c.y+4);});
    if(s.isBike)drawBikeTopDown(ctx,s.carX,440,44,'#e63946');else drawCarTopDown(ctx,s.carX,440,34,52,'#e63946');
    if(s.boosting&&s.alive){ctx.fillStyle=`hsl(${25+Math.random()*15},100%,${50+Math.random()*30}%)`;const fl=10+Math.random()*15;ctx.beginPath();ctx.moveTo(s.carX-6,468);ctx.lineTo(s.carX,468+fl);ctx.lineTo(s.carX+6,468);ctx.closePath();ctx.fill();}
    ctx.fillStyle='#fff';ctx.font='bold 13px Orbitron,monospace';ctx.textAlign='left';ctx.fillText(`${Math.round(s.speed*30)} km/h`,8,22);
    if(s.multiplier>1){ctx.fillStyle=s.multiplier>=3?'#f59e0b':'#10b981';ctx.fillText(`COMBO x${s.multiplier}`,8,42);}
    ctx.fillStyle='#333';ctx.fillRect(W-25,10,12,100);ctx.fillStyle=s.boosting?'#f59e0b':'#3b82f6';ctx.fillRect(W-25,10+(100-s.boostFuel),12,s.boostFuel);
    ctx.fillStyle='#fff';ctx.font='8px sans-serif';ctx.textAlign='center';ctx.fillText('NOS',W-19,122);
    if(!s.alive&&s.frame>10){ctx.fillStyle='rgba(0,0,0,0.65)';ctx.fillRect(0,180,W,180);ctx.fillStyle='#e63946';ctx.font='bold 32px Orbitron,monospace';ctx.textAlign='center';ctx.fillText('WRECKED!',W/2,240);ctx.fillStyle='#fff';ctx.font='18px Inter,sans-serif';ctx.fillText(`Score: ${s.score}`,W/2,275);ctx.fillStyle='#94a3b8';ctx.font='13px Inter,sans-serif';ctx.fillText(`${s.isBike?'🏍️ Bike':'🏎️ Car'} mode • Press RACE to retry`,W/2,305);ctx.fillText('Press B to switch vehicle!',W/2,330);}
    ctx.restore();window._gameRAF=requestAnimationFrame(loop);}
  const origGoMap=window.goMap;window.goMap=()=>{document.removeEventListener('keydown',kd);document.removeEventListener('keyup',ku);origGoMap();window.goMap=origGoMap;};loop();
}

// ── Init ──
goMap(); updateBar();
